        function generateInsights(){
            const all=[];
            // Exclude TCC (just joined) and TAS (handled separately, plan in flight)
            const alertStores = D.stores.filter(s=>s.id!=='TCC' && s.id!=='TAS');
            // Day-seeded picker — phrasing varies day to day but stays stable within a day
            const today=new Date();
            // Run-rate gate: decline alerts only fire when current month has ≥10 days of data
            // Today's date.getDate() = day of month. If TRENDS.months has just added the current month,
            // the latest entry's confidence depends on how many days of the month have passed.
            // For now, we treat April as "current" (locked, full month) so this gate is permissive.
            // Switch to: const partialMonth = (currentMonth === thisCalendarMonth) && (today.getDate() < 10);
            // For Apr-locked dashboard, partialMonth is false → all decline alerts allowed.
            const partialMonth = false;  // April Final is locked & complete; flip to date-aware when current=May
            const daySeed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
            const hash=k=>(k||'').split('').reduce((a,c,i)=>a+c.charCodeAt(0)*(i+1),0);
            const pick=(arr,key)=>arr[(daySeed+hash(key))%arr.length];
            // Per-render dedupe: within a single category, ensure no two stores get the same variant back-to-back
            const used={};
            const pickUnique=(arr,key,category)=>{
                if(!used[category]) used[category]=new Set();
                const n=arr.length;
                let idx=(daySeed+hash(key))%n;
                let tries=0;
                while(used[category].has(idx) && tries<n){ idx=(idx+1)%n; tries++; }
                used[category].add(idx);
                // If we've used them all, reset for further wraps
                if(used[category].size>=n) used[category].clear();
                return arr[idx];
            };
            // Biggest improver (Mar → Apr)
            let bestGain={store:null,delta:-99};
            alertStores.forEach(s=>{const c=calc(s.current),m=calc(s.march),d=c.ovS-m.ovS;if(d>bestGain.delta)bestGain={store:s,delta:d,cg:c.ov,mg:m.ov};});
            if(bestGain.store && bestGain.delta>0){
                const v=[
                    bestGain.mg+' \u2192 '+bestGain.cg+' overall. Pull their scorecard \u2014 what\u2019s different vs. last month?',
                    'Climbed '+bestGain.mg+' \u2192 '+bestGain.cg+'. Ask the GM to share the play at next enterprise call.',
                    'Up '+bestGain.mg+' \u2192 '+bestGain.cg+' overall. Listen to 2 of their converted calls and send the clips around.',
                    bestGain.mg+' \u2192 '+bestGain.cg+'. The rest of the group wants to know what they\u2019re drinking.',
                    'Jumped '+bestGain.mg+' \u2192 '+bestGain.cg+'. Schedule a Ring Ring over there while the momentum is real.'
                ];
                all.push({pri:1,type:'opportunity',tag:'Opportunity',title:bestGain.store.id+' \u2014 Biggest Improver',text:pick(v,bestGain.store.id+'gain')});
            }
            // Stuck-low alerts — stores currently at C+ or below (regardless of trend)
            // These are the real coaching priorities, not B+ stores that slipped to B-.
            alertStores.forEach(s=>{
                const c=calc(s.current),m=calc(s.march);
                if(gn(c.ov)<2.3 && gn(c.ov)>1.0){  // C+ or worse, but above the "bottom of board" alert which handles D+/D/F
                    const declined = gn(c.ov)<gn(m.ov);
                    const flat = gn(c.ov)===gn(m.ov);
                    const v=[
                        s.id+' is sitting at '+c.ov+'. Below B− means June extra training — let\'s move it up before then. Pull rep grades and start with the bottom 2.',
                        'Stuck at '+c.ov+'. '+(declined?'Slid from '+m.ov+' last month — ':'')+'pick the one weak side (inbound or outbound) and run a scorecard this week.',
                        c.ov+' overall and not moving the right direction. Schedule a Ring Ring — peer-store of similar size that broke through.',
                        s.id+' grading '+c.ov+'. The June training list keeps getting shorter the more we move now. Where\'s the easiest grade to lift?'
                    ];
                    all.push({pri:0, type:'watch', tag:'Below B−',
                        title:s.id+' — Sitting at '+c.ov+(declined?' (slipped from '+m.ov+')':flat?' (flat)':''),
                        text:pickUnique(v,s.id+'below','below')});
                }
            });
            // Overall declines — only flag as URGENT if landing in the C zone or worse, otherwise pri:1
            alertStores.forEach(s=>{
                if(partialMonth) return;
                const c=calc(s.current),m=calc(s.march);
                if(gn(c.ov)<gn(m.ov)){
                    // Skip if already covered by stuck-low alert above
                    if(gn(c.ov)<2.3 && gn(c.ov)>1.0) return;
                    // Drops landing in B-/B/B+ are coaching opportunities, not crises. Lower priority.
                    const landingInBzone = gn(c.ov)>=2.7;
                    const drop = gn(m.ov)-gn(c.ov);
                    const priority = landingInBzone && drop<0.7 ? 2 : 1;
                    const ibDown=gn(c.ib)<gn(m.ib);
                    const obDown=gn(c.ob)<gn(m.ob);
                    const v=[];
                    // Variant 1: metric-specific opener
                    if(ibDown&&obDown) v.push('Both sides down \u2014 IB '+m.ib+'\u2192'+c.ib+', OB '+m.ob+'\u2192'+c.ob+'. Pick the weaker and start there, this week.');
                    else if(ibDown) v.push('Inbound slipped '+m.ib+'\u2192'+c.ib+'. Call guide check \u2014 are they hooking the trade and asking for the appointment?');
                    else if(obDown) v.push('Outbound slid '+m.ob+'\u2192'+c.ob+'. Pull individual Live% and Appt% \u2014 find who\'s dragging it.');
                    // Variant 2: humor/exasperation \u2014 only when current grade is C+ or worse
                    if(gn(c.ov)<2.3) v.push('What the hell is happening over there? '+m.ov+' \u2192 '+c.ov+' in 30 days.');
                    // Variant 3: action-first
                    if(ibDown&&obDown) v.push('Scorecard this week \u2014 both sides slipping. Don\'t let this become a habit.');
                    else if(ibDown) v.push('Scorecard the inbound calls. Listen for the hook and the ask \u2014 that\'s where '+m.ov+'\u2192'+c.ov+' is coming from.');
                    else if(obDown) v.push('Pull rep-level outbound grades. Is their organizer caught up? Are they touching unsold showroom traffic?');
                    // Variant 4: quietly slid
                    v.push('Quietly slid '+m.ov+' \u2192 '+c.ov+'. Pull individual rep grades on the '+(ibDown&&!obDown?'inbound':obDown&&!ibDown?'outbound':'weaker')+' side \u2014 one or two people are usually doing most of the damage.');
                    // Variant 5: diagnostic
                    if(ibDown&&obDown) v.push(m.ov+' \u2192 '+c.ov+'. Both sides took a hit. Pull the last 10 unconverted calls and see what they have in common.');
                    else if(ibDown) v.push(m.ov+' \u2192 '+c.ov+'. Inbound is the story \u2014 are reps still following the call guide when customers ask for info or out-the-door pricing?');
                    else if(obDown) v.push(m.ov+' \u2192 '+c.ov+'. Outbound\'s where it slid \u2014 bad list kills this number every time. Who is getting fed what?');
                    // Variant 6: the 30-day frame
                    v.push('30 days ago this store was '+m.ov+'. Today it\'s '+c.ov+'. '+(ibDown&&obDown?'Both sides need attention.':ibDown?'Inbound needs the attention.':'Outbound needs the attention.'));
                    all.push({pri:priority,type:'watch',tag:'Watch',title:s.id+' \u2014 Overall declined ('+m.ov+' \u2192 '+c.ov+')',text:pickUnique(v,s.id+'decl','decl')});
                }
            });
            // Big Set swings (Mar → Apr)
            alertStores.forEach(s=>{const d=s.current.set-s.march.set;
                if(d>=10){
                    const v=[
                        s.march.set+'% \u2192 '+s.current.set+'%. Pull 2 strong calls and play them at next huddle.',
                        'Up '+d.toFixed(0)+' pts on Set%. Run a scorecard while the wins are fresh \u2014 lock in what\'s working.',
                        s.march.set+'% to '+s.current.set+'% in a month. Ask the top setter to walk the team through their hook.',
                        'Set% moved '+d.toFixed(0)+' pts. Get a Ring Ring on the books so other stores can borrow it.'
                    ];
                    all.push({pri:2,type:'opportunity',tag:'Opportunity',title:s.id+' \u2014 Set % surged +'+d.toFixed(0)+' pts',text:pickUnique(v,s.id+'setup','setup')});
                }
                if(d<=-8){
                    const v=[
                        s.march.set+'% \u2192 '+s.current.set+'%. Pull 3 unconverted RI calls \u2014 are we hooking the trade? Asking more than once?',
                        'Set% off a cliff: '+s.march.set+'% \u2192 '+s.current.set+'%. Run a scorecard this week and listen for the ask.',
                        'Lost '+Math.abs(d).toFixed(0)+' pts on Set%. Listen to 5 calls with the team and make them name what they hear.',
                        s.march.set+'% down to '+s.current.set+'%. Schedule a Ring Ring in person \u2014 phones are saying something reports can\'t.',
                        'Set% dropped '+Math.abs(d).toFixed(0)+' pts. Which specific reps own the slide? Scorecard their calls \u2014 this is call guide, not the whole team.'
                    ];
                    all.push({pri:1,type:'watch',tag:'Watch',title:s.id+' \u2014 Set % fell '+Math.abs(d).toFixed(0)+' pts',text:pickUnique(v,s.id+'setdn','setdn')});
                }
            });
            // Live Convos drops (Mar → Apr) — usually list quality, small chance timing
            alertStores.forEach(s=>{const d=s.current.live-s.march.live;
                if(d<=-3){
                    const v=[
                        s.march.live+'% \u2192 '+s.current.live+'%. Pull individual Live% \u2014 one rep usually drags this. Is their organizer caught up?',
                        'Live Convos off '+Math.abs(d).toFixed(1)+' pts. Are they working unsold showroom traffic or just old internet leads?',
                        s.march.live+'% dropped to '+s.current.live+'%. Bad list = bad Live%. Look at the list, not the pitch.',
                        'Outbound connect rate slid to '+s.current.live+'%. Check whose organizer is current and whose isn\'t.',
                        s.march.live+'% \u2192 '+s.current.live+'%. Audit lead sources and unsold follow-ups \u2014 we can\'t connect with people we\'re not calling.',
                        'Live at '+s.current.live+'% and we\'re not calling the right people. Unsold showroom from last week \u2014 is anyone touching those?'
                    ];
                    all.push({pri:2,type:'watch',tag:'Watch',title:s.id+' \u2014 Live Convos dropped '+d.toFixed(1)+' pts',text:pickUnique(v,s.id+'livedn','livedn')});
                }
            });
            // Appt% crossed the 10% line
            alertStores.forEach(s=>{
                if(s.current.appt>=10 && s.march.appt<10){
                    const v=[
                        'Appt% broke 10%: '+s.march.appt+'% \u2192 '+s.current.appt+'%. Ask the top rep to walk through the pitch at next huddle.',
                        'Outbound conversion above benchmark ('+s.current.appt+'%). Pull a clip and send it around the enterprise.',
                        s.march.appt+'% up to '+s.current.appt+'% on Appt. Run a scorecard and find the language that\u2019s working.'
                    ];
                    all.push({pri:2,type:'opportunity',tag:'Opportunity',title:s.id+' \u2014 Appt% crossed 10%',text:pickUnique(v,s.id+'apptup','apptup')});
                }
            });
            // RI just hit A-grade
            alertStores.forEach(s=>{
                const c=calc(s.current),m=calc(s.march);
                if(c.rg==='A' && gn(m.rg)<4){
                    const v=[
                        'RI at '+s.current.req+'% (A). Pull the ad mix and routing logs \u2014 what changed?',
                        'Inbound firing at A-grade ('+s.current.req+'%). Ask BDC what\u2019s different before it drifts.',
                        'RI hit A ('+s.current.req+'%). Schedule a Ring Ring while the phones are ringing.'
                    ];
                    all.push({pri:2,type:'opportunity',tag:'Opportunity',title:s.id+' \u2014 RI hit A-grade',text:pickUnique(v,s.id+'rianm','rianm')});
                }
            });
            // Stuck in the red — bottom overall store. Chronic = stuck at low for months; we get more exasperated.
            const ranked=[...alertStores].sort((a,b)=>calc(a.current).ovS-calc(b.current).ovS);
            ranked.slice(0,1).forEach(s=>{
                const c=calc(s.current),m=calc(s.march),b=calc(s.baseline);
                const chronic=gn(c.ov)<=1.0 && gn(m.ov)<=1.0 && gn(b.ov)<=2.0; // baseline was weak AND Mar was weak AND Apr still weak
                if(gn(c.ov)<=1.0){
                    const v=chronic?[
                        'Still at '+c.ov+'. Still. What the hell is happening over there? Pull individual rep grades \u2014 someone has to be sinking it.',
                        c.ov+' in April. Was '+m.ov+' in March. Was '+b.ov+' at baseline. This is chronic \u2014 find the one or two reps dragging the average and scorecard their calls, now.',
                        'Enterprise bottom '+c.ov+' and has not budged. If the weakest rep walked out tomorrow, what happens to the store grade? That tells you where to start.',
                        c.ov+' and flat. Don\'t scorecard the store \u2014 scorecard the worst rep. One person is usually doing most of the damage.'
                    ]:[
                        'Sitting at '+c.ov+' overall. Ride a morning of live calls with one rep \u2014 you\'ll spot it faster than any report.',
                        'Bottom of the enterprise ('+c.ov+'). Pull individual rep grades and find the weak link.',
                        c.ov+' overall and not moving. Run a scorecard this week and see what the phones actually sound like.',
                        'Stuck at '+c.ov+'. Pull rep-level data \u2014 one or two people are probably doing most of the damage.'
                    ];
                    all.push({pri:0,type:'watch',tag:'Watch',title:s.id+' \u2014 Bottom of the board ('+c.ov+')'+(chronic?' — chronic':''),text:pick(v,s.id+'bot')});
                }
            });
            // Regional gap
            const ws=D.stores.filter(s=>s.region==='West'),es=D.stores.filter(s=>s.region==='East');
            const wS=(ws.map(s=>s.current.set).reduce((a,b)=>a+b,0)/ws.length).toFixed(1);
            const eS=(es.map(s=>s.current.set).reduce((a,b)=>a+b,0)/es.length).toFixed(1);
            if(Math.abs(wS-eS)>5){
                const leader=(+wS>+eS)?'West':'East';
                const v=[
                    leader+' is running a different playbook. What script are they using that the other side isn\'t?',
                    'Set% gap of '+Math.abs(wS-eS).toFixed(1)+' pts. Is someone holding out on a better pitch?',
                    leader+' ahead by '+Math.abs(wS-eS).toFixed(1)+' pts on Set%. Coincidence or pattern?'
                ];
                all.push({pri:3,type:'question',tag:'Question',title:'Set % gap: West '+wS+'% vs East '+eS+'%',text:pick(v,'regional')});
            }
            // Derby activity recommendations
            const SCORECARD_URL='https://anderson-scorecard.vercel.app';
            const DERBY_URL='https://ringderby.vercel.app';
            alertStores.forEach(s=>{
                const c=calc(s.current),m=calc(s.march);
                const weakMetrics=[];
                const inboundWeak=c.rg==='F'||c.rg==='D'||c.sg==='F'||c.sg==='D';
                const outboundWeak=c.lg==='F'||c.lg==='D'||c.ag==='F'||c.ag==='D';
                if(inboundWeak) weakMetrics.push('inbound');
                if(outboundWeak) weakMetrics.push('outbound');
                // Manager Ring Ring is primarily an inbound play — recommend when inbound is soft + overall declined
                if(gn(c.ov)<gn(m.ov) && inboundWeak){
                    all.push({pri:1,type:'derby',tag:'Derby',title:s.id+' — Manager Ring Ring Session (5 pts)',
                        text:'Overall declined '+m.ov+' → '+c.ov+' (Mar → Apr) with weak inbound. Manager Ring Ring is primarily an inbound play \u2014 get it booked. <a href="'+SCORECARD_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Open Scorecard</a> | <a href="'+DERBY_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Derby Board</a>'});
                } else if(gn(c.ov)<gn(m.ov) && outboundWeak){
                    all.push({pri:1,type:'derby',tag:'Derby',title:s.id+' — Pull rep-level outbound',
                        text:'Overall declined '+m.ov+' → '+c.ov+' (Mar → Apr) and outbound is the drag. Pull individual rep Live%/Appt% \u2014 find the one or two people pulling the average down and scorecard their calls. <a href="'+SCORECARD_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Open Scorecard</a> | <a href="'+DERBY_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Derby Board</a>'});
                } else if(weakMetrics.length>0){
                    all.push({pri:2,type:'derby',tag:'Derby',title:s.id+' — Scorecard recommended (1 pt)',
                        text:'Weak '+weakMetrics.join(' & ')+' metrics. Scorecard surfaces whether it\'s call guide, pitch, or list. <a href="'+SCORECARD_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Open Scorecard</a> | <a href="'+DERBY_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Derby Board</a>'});
                }
            });
            // Yellow-zone stores → find the weak link
            const midStores=alertStores.filter(s=>{const c=calc(s.current);return gColor(c.ov)==='yellow';});
            if(midStores.length>0){
                const ywv=[
                    midStores.length+' yellow stores — find the weak link',
                    midStores.length+' stores stuck in yellow — who\'s dragging the average?',
                    midStores.length+' yellow stores — pull individual rep grades'
                ];
                const ywt=[
                    midStores.map(s=>s.id).join(', ')+' are stuck in yellow. One or two reps are usually sinking the store average \u2014 pull individual grades and scorecard the bottom of the list.',
                    midStores.map(s=>s.id).join(', ')+' in the yellow zone. Find the specific people dragging the number down and scorecard their calls \u2014 don\'t paint the whole team with one brush.',
                    midStores.map(s=>s.id).join(', ')+' holding in yellow. Pull rep-level data and find the weak link. If the bottom rep walked out tomorrow, what happens to the store grade?'
                ];
                all.push({pri:3,type:'derby',tag:'Derby',title:pick(ywv,'yw-t'),
                    text:pick(ywt,'yw-b')+' <a href="'+SCORECARD_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Open Scorecard</a> | <a href="'+DERBY_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Derby Board</a>'});
            }
            // General Derby reminder
            all.push({pri:5,type:'system',tag:'',title:'Derby Reminder',
                text:'Ring Ring Derby is live! <a href="'+DERBY_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">View Derby Scoreboard</a> | <a href="'+SCORECARD_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Open Scorecard</a>'});
            // Sort by priority. Cap at 3-4, always show at least one West and one East store.
            all.sort((a,b)=>a.pri-b.pri);
            const westIds=new Set(D.stores.filter(s=>s.region==='West').map(s=>s.id));
            const storeIds=new Set(D.stores.map(s=>s.id));
            const isStoreMsg=m=>storeIds.has(m.title.split(' ')[0]);
            // Manager engagement watchlist — surface stores where managers aren't listening.
            // GMs intentionally NOT critiqued here (they're not expected to be in call review).
            // GSMs (General Sales Managers) ARE expected to coach — flag them when they're absent.
            if(typeof MANAGERS!=='undefined'){
                alertStores.forEach(s=>{
                    const mgrs = MANAGERS[s.id] || [];
                    const coachingMgrs = mgrs.filter(m=>m.role!=='GM');  // SMs + GSMs
                    const totL = coachingMgrs.reduce((a,m)=>a+m.l,0);
                    const totS = coachingMgrs.reduce((a,m)=>a+m.s,0);
                    const gsms = mgrs.filter(m=>m.role==='GSM');
                    const gsmsListening = gsms.filter(m=>m.l>0).length;
                    // No managers listening at all
                    if(coachingMgrs.length===0 || totL<5){
                        all.push({pri:1,type:'watch',tag:'Coaching Gap',title:s.id+' — Manager engagement low',
                            text:'Only '+totL+' listens MTD across SMs and GSMs. The team that\'s not reviewed isn\'t coached. Pull up 5 calls together this week.'});
                    } else if(gsms.length>=1 && gsmsListening===0){
                        // GSMs present but none engaged
                        all.push({pri:2,type:'watch',tag:'Coaching Gap',title:s.id+' — GSM not in calls',
                            text:'SMs are listening ('+totL+' MTD) but the GSM has 0 listens. The GSM owns coaching cadence — get them on the calls.'});
                    }
                });
            }
            // Cap notifications at 3 (set by user — keep it focused)
            const MAX=3;
            const result=[];
            for(const m of all){
                if(result.length>=MAX) break;
                result.push(m);
            }
            // East/West balance — check only store-tagged messages
            const storeMsgs=result.filter(isStoreMsg);
            const hasWest=storeMsgs.some(m=>westIds.has(m.title.split(' ')[0]));
            const hasEast=storeMsgs.some(m=>!westIds.has(m.title.split(' ')[0]) && isStoreMsg(m));
            if(result.length>=2){
                if(!hasWest){
                    const w=all.find(m=>isStoreMsg(m) && westIds.has(m.title.split(' ')[0]));
                    if(w && result.indexOf(w)<0){
                        // Replace the last store-tagged message that's NOT the only East rep
                        for(let i=result.length-1;i>=0;i--){if(isStoreMsg(result[i]) && !westIds.has(result[i].title.split(' ')[0])){result[i]=w;break;}}
                    }
                }
                if(!hasEast){
                    const e=all.find(m=>isStoreMsg(m) && !westIds.has(m.title.split(' ')[0]));
                    if(e && result.indexOf(e)<0){
                        for(let i=result.length-1;i>=0;i--){if(isStoreMsg(result[i]) && westIds.has(result[i].title.split(' ')[0])){result[i]=e;break;}}
                    }
                }
            }
            return result;
        }

        function msgHtml(m){
            const tc=m.type==='opportunity'?'opp':m.type==='question'?'quest':m.type==='watch'?'wtch':m.type==='derby'?'drby':'';
            const tag=m.tag?'<span class="msg-tag '+tc+'">'+m.tag+'</span>':'';
            return '<div class="chat-msg '+m.type+'">'+tag+'<h4>'+m.title+'</h4><p>'+m.text+'</p></div>';
        }

        function renderInsights(){
            const msgs=generateInsights();
            const body=document.getElementById('chatBody');
            const badge=document.getElementById('chatBadge');
            const count=msgs.filter(m=>m.type!=='system').length;
            badge.textContent=count;
            badge.style.display=count>0?'flex':'none';
            body.innerHTML=msgs.map(msgHtml).join('');
        }

        // ===================================
        // Q&A ENGINE
        // ===================================
        function askQuestion(){
            const input=document.getElementById('chatInput');
            const q=input.value.trim();
            if(!q)return;
            input.value='';
            const body=document.getElementById('chatBody');
            body.innerHTML+='<div class="chat-msg user"><p>'+q+'</p></div>';
            const answer=answerQuery(q);
            body.innerHTML+='<div class="chat-msg answer"><p>'+answer+'</p></div>';
            body.scrollTop=body.scrollHeight;
        }

        function answerQuery(q){
            const ql=q.toLowerCase();
            // Find store by ID or partial name
            const matchStore=D.stores.find(s=>ql.includes(s.id.toLowerCase())||ql.includes(s.name.toLowerCase().split(' ').pop()));
            if(matchStore){
                const s=matchStore;
                const c=calc(s.current),m=calc(s.march);
                const trend=gn(c.ov)>gn(m.ov)?'improved from':gn(c.ov)<gn(m.ov)?'slipped from':'held at';
                // Rank metrics by grade to find best/worst
                const mg=[
                    {k:'req',label:'RI',val:s.current.req,g:c.rg,gv:gn(c.rg)},
                    {k:'set',label:'Set',val:s.current.set,g:c.sg,gv:gn(c.sg)},
                    {k:'live',label:'Live',val:s.current.live,g:c.lg,gv:gn(c.lg)},
                    {k:'appt',label:'Appt',val:s.current.appt,g:c.ag,gv:gn(c.ag)}
                ];
                const best=[...mg].sort((a,b)=>b.gv-a.gv)[0];
                const worst=[...mg].sort((a,b)=>a.gv-b.gv)[0];
                const setArr=TRENDS.set[s.id], riArr=TRENDS.ri[s.id];
                const vals=a=>a?a.filter(v=>v!==null):[];
                const sv=vals(setArr), rv=vals(riArr);
                const setDelta=sv.length>=2?sv[sv.length-1]-sv[0]:0;
                const riDelta=rv.length>=2?rv[rv.length-1]-rv[0]:0;
                // Win — metric-specific
                let winCoach;
                if(best.k==='req') winCoach='RI at '+best.val+'% ('+best.g+'). Inbound capture is working. Ask what changed \u2014 routing, phone training, ad mix \u2014 and figure out what to bottle.';
                else if(best.k==='set') winCoach='Set% at '+best.val+'% ('+best.g+'). The inbound team is closing on the phone. Ask top setters to walk through how they\'re asking for the appointment at the next huddle.';
                else if(best.k==='live') winCoach='Live% at '+best.val+'% ('+best.g+'). Outbound connect rate is strong \u2014 lists and timing are right. Ask who\'s working the best lead sources and make that the standard.';
                else winCoach='Appt% at '+best.val+'% ('+best.g+'). When they get people live on outbound, they\'re booking. Ask the top rep to demo their pitch \u2014 the bottom half should borrow it directly.';
                const win='<strong>Lead with the win</strong> \u2014 '+winCoach;
                // Gap — metric-specific, reflects what the number actually means
                let gapCoach;
                if(worst.k==='req') gapCoach='RI at '+worst.val+'% ('+worst.g+') means reps aren\'t asking for the appointment. First question: are they following the call guide? Then: which reps specifically are lower than the rest, and which call types are tripping them up (out-the-door price asks, info requests)? They still need to ask for the appointment even when the customer is asking for info.';
                else if(worst.k==='set') gapCoach='Set% at '+worst.val+'% ('+worst.g+') means people are calling ready and hanging up without an appointment. This is call guide again \u2014 hook the trade, ask more than once, give them a reason to come in. Which reps have the lowest set rate? Review their calls specifically.';
                else if(worst.k==='live') gapCoach='Live% at '+worst.val+'% ('+worst.g+') means we\'re not reaching people. Who are they calling? Is their organizer caught up? Are they following up with unsold showroom traffic? Bad list kills this number every time \u2014 tiny chance it\'s timing. Find the rep dragging the average and look at their list, not their effort.';
                else gapCoach='Appt% at '+worst.val+'% ('+worst.g+') means they\'re getting people live and not booking. Pull individual rep Appt% \u2014 which one or two people are pulling the average down? Scorecard their outbound calls specifically.';
                const gap='<strong>Name the gap</strong> \u2014 '+gapCoach;
                // Push — content-level questions, not staffing abstractions
                // Chronic = low baseline AND low March AND still low = hasn't moved over months. Time for exasperation.
                const b=calc(s.baseline);
                const chronic=gn(c.ov)<=2.0 && gn(m.ov)<=2.0 && gn(b.ov)<=2.3;
                let push;
                if(chronic) push='<strong>The push</strong> \u2014 Baseline was '+b.ov+', March was '+m.ov+', April is '+c.ov+'. This isn\'t a bad week, it\'s a pattern. Stop scorecarding the store and start scorecarding people. Pull individual rep grades \u2014 who is the single worst performer? If they walked out tomorrow, what happens to the store grade? That tells you where to start.';
                else if(riDelta>=10 && setDelta<3) push='<strong>The push</strong> \u2014 RI up '+rv[0]+'% \u2192 '+rv[rv.length-1]+'% but Set% is flat. Call guide check: are they hooking the trade, asking for the appointment more than once, giving them a reason to come in? Which reps have the lowest set rate \u2014 listen to their calls.';
                else if(riDelta>=10 && setDelta>=3) push='<strong>The push</strong> \u2014 RI up '+rv[0]+'% \u2192 '+rv[rv.length-1]+'% and Set% keeping pace. Pull 2 recent converted calls and use them for a team huddle \u2014 lock the language in before month-end.';
                else if(setDelta<=-5) push='<strong>The push</strong> \u2014 Set% dropped '+sv[0]+'% \u2192 '+sv[sv.length-1]+'% since Jan. This is the call guide \u2014 are they hooking the trade, asking for the appointment more than once, giving a reason to come in? Find the reps with the lowest set rate and listen to their calls.';
                else if(setDelta>=5) push='<strong>The push</strong> \u2014 Set% up '+sv[0]+'% \u2192 '+sv[sv.length-1]+'% since Jan. Pull a recent strong call and play it at the next huddle so everyone hears the ask and the hook.';
                else if(gn(c.ov)>=3.0) push='<strong>The push</strong> \u2014 Grades are solid. Pick '+worst.label+' and scorecard a handful of calls this week \u2014 find the gap between "good" and "A" before they plateau.';
                else push='<strong>The push</strong> \u2014 Numbers are stuck. Pull individual rep grades and scorecard the bottom of the list \u2014 don\'t paint the whole team with one brush.';
                const fmt=(mv,cv)=>mv!=null?mv+'% \u2192 '+cv+'%':cv+'%';
                let resp='<strong>'+s.id+'</strong> \u2014 '+s.name+'<br>'+
                    'Overall <strong>'+c.ov+'</strong> ('+trend+' '+m.ov+' in Mar)<br><br>'+
                    '<strong>1.</strong> '+win+'<br><br>'+
                    '<strong>2.</strong> '+gap+'<br><br>'+
                    '<strong>3.</strong> '+push+'<br><br>'+
                    '<em>Apr \u2192 May:</em><br>'+
                    'Inbound \u2014 RI '+fmt(s.march.req,s.current.req)+' \u00b7 Set '+fmt(s.march.set,s.current.set)+'<br>'+
                    'Outbound \u2014 Live '+fmt(s.march.live,s.current.live)+' \u00b7 Appt '+fmt(s.march.appt,s.current.appt);
                return resp;
            }
            // Best/top/highest
            if(ql.match(/best|top|highest|#1|number one|winner/)){
                const metric=ql.includes('set')?'set':ql.includes('req')||ql.includes(' ri')?'req':ql.includes('live')?'live':ql.includes('appt')?'appt':'ov';
                if(metric==='ov'){
                    const ranked=[...D.stores].sort((a,b)=>calc(b.current).ovS-calc(a.current).ovS);
                    return 'Top 5 overall:<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+calc(s.current).ov).join('<br>');
                }else{
                    const ranked=[...D.stores].sort((a,b)=>b.current[metric]-a.current[metric]);
                    return 'Top 5 by '+metric+':<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+s.current[metric]+'%').join('<br>');
                }
            }
            // Worst/lowest/bottom
            if(ql.match(/worst|lowest|bottom|struggling|weakest/)){
                const metric=ql.includes('set')?'set':ql.includes('req')||ql.includes(' ri')?'req':ql.includes('live')?'live':ql.includes('appt')?'appt':'ov';
                if(metric==='ov'){
                    const ranked=[...D.stores].sort((a,b)=>calc(a.current).ovS-calc(b.current).ovS);
                    return 'Bottom 5 overall:<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+calc(s.current).ov).join('<br>');
                }else{
                    const ranked=[...D.stores].sort((a,b)=>a.current[metric]-b.current[metric]);
                    return 'Bottom 5 by '+metric+':<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+s.current[metric]+'%').join('<br>');
                }
            }
            // Improved / declined
            if(ql.match(/improved|improving|up|gaining/)){
                const improved=D.stores.filter(s=>gn(calc(s.current).ov)>gn(calc(s.march).ov));
                if(!improved.length) return 'No stores improved their overall letter grade from March.';
                return improved.length+' stores improved (Mar → Apr):<br>'+improved.map(s=>'\u2022 <strong>'+s.id+'</strong> '+calc(s.march).ov+' \u2192 '+calc(s.current).ov).join('<br>');
            }
            if(ql.match(/declined|dropping|down|falling|slipping/)){
                const declined=D.stores.filter(s=>gn(calc(s.current).ov)<gn(calc(s.march).ov));
                if(!declined.length) return 'No stores declined in overall letter grade from March. Everyone is holding or improving!';
                return declined.length+' stores declined (Mar → Apr):<br>'+declined.map(s=>'\u2022 <strong>'+s.id+'</strong> '+calc(s.march).ov+' \u2192 '+calc(s.current).ov).join('<br>');
            }
            // West vs East / compare regions
            if(ql.match(/west|east|region|compare/)){
                const ws=D.stores.filter(s=>s.region==='West'),es=D.stores.filter(s=>s.region==='East');
                const wa=v=>(ws.map(s=>s.current[v]).reduce((a,b)=>a+b,0)/ws.length).toFixed(1);
                const ea=v=>(es.map(s=>s.current[v]).reduce((a,b)=>a+b,0)/es.length).toFixed(1);
                const wOv=s2g(ws.map(s=>calc(s.current).ovS).reduce((a,b)=>a+b,0)/ws.length);
                const eOv=s2g(es.map(s=>calc(s.current).ovS).reduce((a,b)=>a+b,0)/es.length);
                return '<strong>West</strong> (11 stores): Overall '+wOv+' | RI '+wa('req')+'% | Set '+wa('set')+'% | Live '+wa('live')+'% | Appt '+wa('appt')+'%<br><br>'+
                    '<strong>East</strong> (5 stores): Overall '+eOv+' | RI '+ea('req')+'% | Set '+ea('set')+'% | Live '+ea('live')+'% | Appt '+ea('appt')+'%';
            }
            // Average / overall
            if(ql.match(/average|overall|all stores|group/)){
                const avg=v=>(D.stores.map(s=>s.current[v]).reduce((a,b)=>a+b,0)/D.stores.length).toFixed(1);
                const ovGrade=s2g(D.stores.map(s=>calc(s.current).ovS).reduce((a,b)=>a+b,0)/D.stores.length);
                return 'All 17 stores average:<br>Overall: <strong>'+ovGrade+'</strong><br>RI: '+avg('req')+'% | Set: '+avg('set')+'% | Live: '+avg('live')+'% | Appt: '+avg('appt')+'%';
            }
            // Trend queries
            if(ql.match(/trend|month|ytd|over time|history|improving overall|getting better|trajectory/)){
                const metric = ql.includes('ri') || ql.includes('request') ? 'ri' : 'set';
                const label = metric==='set' ? 'Set%' : 'RI%';
                const ms = TRENDS.months;
                const janAvg = trendAvg(metric,0), aprAvg = trendAvg(metric,ms.length-1);
                const ytdD = aprAvg-janAvg;
                let resp = '<strong>'+label+' YTD Trend</strong><br>Group avg: '+janAvg.toFixed(1)+'% (Jan) → <strong>'+aprAvg.toFixed(1)+'%</strong> (Apr)<br>'+
                    'YTD change: <strong style="color:'+(ytdD>=0?'#16a34a':'#dc2626')+'">'+(ytdD>=0?'+':'')+ytdD.toFixed(1)+'</strong><br><br>';
                // Top movers
                const deltas=[];
                D.stores.forEach(s=>{const v=TRENDS[metric][s.id];if(v&&v[0]!==null&&v[ms.length-1]!==null)deltas.push({id:s.id,d:v[ms.length-1]-v[0]});});
                deltas.sort((a,b)=>b.d-a.d);
                resp+='Top gainers: '+deltas.slice(0,3).map(s=>'<strong>'+s.id+'</strong> (+'+ s.d+')').join(', ')+'<br>';
                resp+='Needs attention: '+deltas.slice(-3).reverse().map(s=>'<strong>'+s.id+'</strong> ('+s.d+')').join(', ');
                resp+='<br><br>See the <strong>Inbound Trends</strong> tab for the full chart and table.';
                return resp;
            }
            // Benchmark
            if(ql.match(/bench|target|goal/)){
                return 'Benchmarks: RI 80% | Set 45% | Live Convos 20% | Appt Set 10%<br><br>Grade weighting: Overall = 60% Inbound + 40% Outbound<br>Inbound = 50% RI + 50% Set<br>Outbound = 60% Live + 40% Appt';
            }
            // Green / red / yellow count
            if(ql.match(/green|red|yellow|how many/)){
                let g=0,y=0,r=0;
                D.stores.forEach(s=>{const col=gColor(calc(s.current).ov);if(col==='green')g++;else if(col==='yellow')y++;else r++;});
                return '<strong>'+g+'</strong> green (A/A-/B+), <strong>'+y+'</strong> yellow (B through C), <strong>'+r+'</strong> red (C- and below)';
            }
            // Derby / scorecard / activities
            if(ql.match(/derby|scorecard|manager session|activity|points|low performer|pulling down/)){
                const SCORECARD_URL='https://anderson-scorecard.vercel.app';
                const DERBY_URL='https://ringderby.vercel.app';
                const recs=[];
                // Declined stores with inbound issues → Manager Ring Ring (5 pts, inbound-primary)
                const declined=D.stores.filter(s=>gn(calc(s.current).ov)<gn(calc(s.march).ov));
                const inboundDeclined=declined.filter(s=>{const c=calc(s.current);return gn(c.rg)<3.0||gn(c.sg)<3.0;});
                if(inboundDeclined.length) recs.push('<strong>Manager Ring Ring Session (5 pts)</strong> for: '+inboundDeclined.map(s=>s.id).join(', ')+' \u2014 inbound declined (RI/Set). Manager Ring Ring is primarily an inbound play.');
                // Stores with F/D metrics → Scorecard (1 pt)
                const weak=D.stores.filter(s=>{const c=calc(s.current);return c.rg==='F'||c.rg==='D'||c.sg==='F'||c.sg==='D'||c.lg==='F'||c.lg==='D'||c.ag==='F'||c.ag==='D';});
                const shopStores=weak.filter(s=>!inboundDeclined.includes(s));
                if(shopStores.length) recs.push('<strong>Scorecard (1 pt)</strong> for: '+shopStores.map(s=>s.id).join(', ')+' \u2014 failing metrics. Scorecard will surface whether it\'s call guide, pitch, or list.');
                // Yellow stores → find low performers
                const yellow=D.stores.filter(s=>gColor(calc(s.current).ov)==='yellow'&&!inboundDeclined.includes(s)&&!shopStores.includes(s));
                if(yellow.length) recs.push('<strong>Find the weak link</strong> at: '+yellow.map(s=>s.id).join(', ')+' \u2014 yellow zone. Pull individual rep grades. One or two people are usually sinking the store average \u2014 scorecard their calls specifically.');
                if(!recs.length) recs.push('All stores performing. If you want to stay sharp: pick the lowest-graded rep at any store and scorecard a few of their calls.');
                return recs.join('<br><br>')+'<br><br><a href="'+SCORECARD_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Open Scorecard</a> | <a href="'+DERBY_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">View Derby Board</a>';
            }
            return 'Try asking about a specific store (e.g. "How is Acura doing?"), rankings ("Who has the best set %?"), comparisons ("West vs East"), status ("Who improved?"), or Derby activities ("Which stores need a scorecard?").';
        }

        // ============================================
        // STORE 1-PAGER — baseline → April + top coaching candidates
        // ============================================
        function showOnePager(storeId){
            const store = D.stores.find(s=>s.id===storeId);
            if(!store) return;
            const c = calc(store.current), b = calc(store.baseline);
            const ibStaff = (typeof INBOUND_STAFF !== 'undefined') ? (INBOUND_STAFF[storeId] || []) : [];
            const obStaff = STAFF[storeId] || [];

            // Coaching candidates
            // Inbound: VOLUME-FIRST — sort by IB volume desc, filter to ask<70 OR set<40
            const ibCandidates = ibStaff.map(r=>{
                const askPct = r.ib>0 ? Math.round((r.asked/r.ib)*100) : 0;
                const setPct = r.ib>0 ? Math.round((r.booked/r.ib)*100) : 0;
                return {...r, askPct, setPct};
            }).filter(r=>r.ib>=5 && (r.askPct<70 || r.setPct<40))
              .sort((a,b)=>b.ib-a.ib)
              .slice(0,3);

            // Outbound: 20% live, 10% appt benchmark.
            // Leverage = OB × live_shortfall + connects × appt_shortfall × 2 (each appt worth more)
            // Min 100 OB. Use APRIL_OUTBOUND (April-final per-rep) — current STAFF holds May MTD.
            const obSrc = (typeof APRIL_OUTBOUND !== 'undefined') ? (APRIL_OUTBOUND[storeId] || []) : obStaff;
            const obCandidates = obSrc.map(r=>{
                const live = r.ob>0 ? +(r.c/r.ob*100).toFixed(1) : 0;
                const appt = r.c>0 ? +(r.a/r.c*100).toFixed(1) : 0;
                const liveShort = Math.max(0, 20-live);
                const apptShort = Math.max(0, 10-appt);
                const leverage = r.ob*liveShort + r.c*apptShort*2;
                return {...r, live, appt, liveShort, apptShort, leverage};
            }).filter(r=>r.ob>=100 && r.leverage>0)
              .sort((a,b)=>b.leverage-a.leverage)
              .slice(0,3);

            // Mini sparkline: render TRENDS values as inline SVG
            function sparkline(values, color){
                const vs = values.filter(v=>v!==null);
                if(vs.length<2) return '';
                const min = Math.min(...vs), max = Math.max(...vs), range = max-min || 1;
                const w=120, h=28;
                const pts = values.map((v,i)=>{
                    if(v===null) return null;
                    const x = (i/(values.length-1))*w;
                    const y = h - ((v-min)/range)*h;
                    return `${x},${y}`;
                }).filter(p=>p);
                return `<svg width="${w}" height="${h}" style="vertical-align:middle;"><polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${pts.map(p=>{const [x,y]=p.split(',');return `<circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`;}).join('')}</svg>`;
            }
            const riTrend = TRENDS.ri[storeId] || [];
            const setTrend = TRENDS.set[storeId] || [];
            const liveTrend = OB_TRENDS.live[storeId] || [];
            const apptTrend = OB_TRENDS.appt[storeId] || [];

            // Delta arrows
            function delta(b, c, isInt){
                const d = c-b;
                const arrow = d>0.05?'<span style="color:#15803d;">▲</span>':d<-0.05?'<span style="color:#dc2626;">▼</span>':'<span style="color:#94a3b8;">—</span>';
                const sign = d>0?'+':'';
                const fmt = isInt? d.toFixed(1) : d.toFixed(1);
                return `<span style="font-weight:600;">${arrow} ${sign}${fmt}</span>`;
            }
            function row(label, b, c, bench, metric){
                const bg = gg(b, metric), cg = gg(c, metric);
                return `<tr>
                    <td style="padding:5px 8px;color:#475569;font-weight:600;font-size:12px;">${label}</td>
                    <td style="padding:5px 8px;font-size:12px;color:#64748b;">${b}% <span class="g ${gc(bg)}" style="font-size:10px;">${bg}</span></td>
                    <td style="padding:5px 8px;font-size:12px;color:#1a1a2e;font-weight:600;">${c}% <span class="g ${gc(cg)}" style="font-size:10px;">${cg}</span></td>
                    <td style="padding:5px 8px;font-size:11px;">${delta(b,c)}</td>
                </tr>`;
            }

            // "Where to focus" auto-line
            const ibD = gn(c.ib)-gn(b.ib);
            const obD = gn(c.ob)-gn(b.ob);
            let focus;
            if(ibD>0.5 && obD>0.5) focus = 'Strong gains both sides since baseline. Hold the line and protect what\'s working.';
            else if(ibD>obD+0.3) focus = 'Inbound is the win — outbound is where the next grade comes from.';
            else if(obD>ibD+0.3) focus = 'Outbound carrying the program — inbound conversion is the next move.';
            else if(ibD<-0.3 || obD<-0.3) focus = 'Slipped from baseline. Pull the rep coaching list above and run scorecards this week.';
            else focus = 'Holding steady since baseline. Look at the rep-level list above to find the next half-grade.';

            const region = store.region;
            const html = `
                <div class="staff-modal-hdr" style="background:#fff;">
                    <div>
                        <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#94a3b8;text-transform:uppercase;">Store 1‑Pager · ${region}</div>
                        <h3 style="font-size:18px;margin-top:2px;">${store.name}</h3>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;">

            const overlay = document.getElementById('staffOverlay');
