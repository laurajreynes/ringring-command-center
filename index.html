        function askQuestion(){
            const input=document.getElementById('chatInput');
            const q=input.value.trim();
            if(!q)return;
            input.value='';
            const body=document.getElementById('chatBody');
            body.innerHTML+='<div class="chat-msg user"><p>'+q+'</p></div>';
            const answer=answerQuery(q);
            body.innerHTML+='<div class="chat-msg answer"><p>'+answer+'</p></div>';
            body.scrollTop=body.scrollHeight;
        }

        function answerQuery(q){
            const ql=q.toLowerCase();
            // Find store by ID or partial name
            const matchStore=D.stores.find(s=>ql.includes(s.id.toLowerCase())||ql.includes(s.name.toLowerCase().split(' ').pop()));
            if(matchStore){
                const s=matchStore;
                const c=calc(s.current),m=calc(s.march);
                const trend=gn(c.ov)>gn(m.ov)?'improved from':gn(c.ov)<gn(m.ov)?'slipped from':'held at';
                // Rank metrics by grade to find best/worst
                const mg=[
                    {k:'req',label:'RI',val:s.current.req,g:c.rg,gv:gn(c.rg)},
                    {k:'set',label:'Set',val:s.current.set,g:c.sg,gv:gn(c.sg)},
                    {k:'live',label:'Live',val:s.current.live,g:c.lg,gv:gn(c.lg)},
                    {k:'appt',label:'Appt',val:s.current.appt,g:c.ag,gv:gn(c.ag)}
                ];
                const best=[...mg].sort((a,b)=>b.gv-a.gv)[0];
                const worst=[...mg].sort((a,b)=>a.gv-b.gv)[0];
                const setArr=TRENDS.set[s.id], riArr=TRENDS.ri[s.id];
                const vals=a=>a?a.filter(v=>v!==null):[];
                const sv=vals(setArr), rv=vals(riArr);
                const setDelta=sv.length>=2?sv[sv.length-1]-sv[0]:0;
                const riDelta=rv.length>=2?rv[rv.length-1]-rv[0]:0;
                // Win — metric-specific
                let winCoach;
                if(best.k==='req') winCoach='RI at '+best.val+'% ('+best.g+'). Inbound capture is working. Ask what changed \u2014 routing, phone training, ad mix \u2014 and figure out what to bottle.';
                else if(best.k==='set') winCoach='Set% at '+best.val+'% ('+best.g+'). The inbound team is closing on the phone. Ask top setters to walk through how they\'re asking for the appointment at the next huddle.';
                else if(best.k==='live') winCoach='Live% at '+best.val+'% ('+best.g+'). Outbound connect rate is strong \u2014 lists and timing are right. Ask who\'s working the best lead sources and make that the standard.';
                else winCoach='Appt% at '+best.val+'% ('+best.g+'). When they get people live on outbound, they\'re booking. Ask the top rep to demo their pitch \u2014 the bottom half should borrow it directly.';
                const win='<strong>Lead with the win</strong> \u2014 '+winCoach;
                // Gap — metric-specific, reflects what the number actually means
                let gapCoach;
                if(worst.k==='req') gapCoach='RI at '+worst.val+'% ('+worst.g+') means reps aren\'t asking for the appointment. First question: are they following the call guide? Then: which reps specifically are lower than the rest, and which call types are tripping them up (out-the-door price asks, info requests)? They still need to ask for the appointment even when the customer is asking for info.';
                else if(worst.k==='set') gapCoach='Set% at '+worst.val+'% ('+worst.g+') means people are calling ready and hanging up without an appointment. This is call guide again \u2014 hook the trade, ask more than once, give them a reason to come in. Which reps have the lowest set rate? Review their calls specifically.';
                else if(worst.k==='live') gapCoach='Live% at '+worst.val+'% ('+worst.g+') means we\'re not reaching people. Who are they calling? Is their organizer caught up? Are they following up with unsold showroom traffic? Bad list kills this number every time \u2014 tiny chance it\'s timing. Find the rep dragging the average and look at their list, not their effort.';
                else gapCoach='Appt% at '+worst.val+'% ('+worst.g+') means they\'re getting people live and not booking. Pull individual rep Appt% \u2014 which one or two people are pulling the average down? Scorecard their outbound calls specifically.';
                const gap='<strong>Name the gap</strong> \u2014 '+gapCoach;
                // Push — content-level questions, not staffing abstractions
                // Chronic = low baseline AND low March AND still low = hasn't moved over months. Time for exasperation.
                const b=calc(s.baseline);
                const chronic=gn(c.ov)<=2.0 && gn(m.ov)<=2.0 && gn(b.ov)<=2.3;
                let push;
                if(chronic) push='<strong>The push</strong> \u2014 Baseline was '+b.ov+', March was '+m.ov+', April is '+c.ov+'. This isn\'t a bad week, it\'s a pattern. Stop scorecarding the store and start scorecarding people. Pull individual rep grades \u2014 who is the single worst performer? If they walked out tomorrow, what happens to the store grade? That tells you where to start.';
                else if(riDelta>=10 && setDelta<3) push='<strong>The push</strong> \u2014 RI up '+rv[0]+'% \u2192 '+rv[rv.length-1]+'% but Set% is flat. Call guide check: are they hooking the trade, asking for the appointment more than once, giving them a reason to come in? Which reps have the lowest set rate \u2014 listen to their calls.';
                else if(riDelta>=10 && setDelta>=3) push='<strong>The push</strong> \u2014 RI up '+rv[0]+'% \u2192 '+rv[rv.length-1]+'% and Set% keeping pace. Pull 2 recent converted calls and use them for a team huddle \u2014 lock the language in before month-end.';
                else if(setDelta<=-5) push='<strong>The push</strong> \u2014 Set% dropped '+sv[0]+'% \u2192 '+sv[sv.length-1]+'% since Jan. This is the call guide \u2014 are they hooking the trade, asking for the appointment more than once, giving a reason to come in? Find the reps with the lowest set rate and listen to their calls.';
                else if(setDelta>=5) push='<strong>The push</strong> \u2014 Set% up '+sv[0]+'% \u2192 '+sv[sv.length-1]+'% since Jan. Pull a recent strong call and play it at the next huddle so everyone hears the ask and the hook.';
                else if(gn(c.ov)>=3.0) push='<strong>The push</strong> \u2014 Grades are solid. Pick '+worst.label+' and scorecard a handful of calls this week \u2014 find the gap between "good" and "A" before they plateau.';
                else push='<strong>The push</strong> \u2014 Numbers are stuck. Pull individual rep grades and scorecard the bottom of the list \u2014 don\'t paint the whole team with one brush.';
                const fmt=(mv,cv)=>mv!=null?mv+'% \u2192 '+cv+'%':cv+'%';
                let resp='<strong>'+s.id+'</strong> \u2014 '+s.name+'<br>'+
                    'Overall <strong>'+c.ov+'</strong> ('+trend+' '+m.ov+' in Mar)<br><br>'+
                    '<strong>1.</strong> '+win+'<br><br>'+
                    '<strong>2.</strong> '+gap+'<br><br>'+
                    '<strong>3.</strong> '+push+'<br><br>'+
                    '<em>Mar \u2192 Apr:</em><br>'+
                    'Inbound \u2014 RI '+fmt(s.march.req,s.current.req)+' \u00b7 Set '+fmt(s.march.set,s.current.set)+'<br>'+
                    'Outbound \u2014 Live '+fmt(s.march.live,s.current.live)+' \u00b7 Appt '+fmt(s.march.appt,s.current.appt);
                return resp;
            }
            // Best/top/highest
            if(ql.match(/best|top|highest|#1|number one|winner/)){
                const metric=ql.includes('set')?'set':ql.includes('req')||ql.includes(' ri')?'req':ql.includes('live')?'live':ql.includes('appt')?'appt':'ov';
                if(metric==='ov'){
                    const ranked=[...D.stores].sort((a,b)=>calc(b.current).ovS-calc(a.current).ovS);
                    return 'Top 5 overall:<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+calc(s.current).ov).join('<br>');
                }else{
                    const ranked=[...D.stores].sort((a,b)=>b.current[metric]-a.current[metric]);
                    return 'Top 5 by '+metric+':<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+s.current[metric]+'%').join('<br>');
                }
            }
            // Worst/lowest/bottom
            if(ql.match(/worst|lowest|bottom|struggling|weakest/)){
                const metric=ql.includes('set')?'set':ql.includes('req')||ql.includes(' ri')?'req':ql.includes('live')?'live':ql.includes('appt')?'appt':'ov';
                if(metric==='ov'){
                    const ranked=[...D.stores].sort((a,b)=>calc(a.current).ovS-calc(b.current).ovS);
                    return 'Bottom 5 overall:<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+calc(s.current).ov).join('<br>');
                }else{
                    const ranked=[...D.stores].sort((a,b)=>a.current[metric]-b.current[metric]);
                    return 'Bottom 5 by '+metric+':<br>'+ranked.slice(0,5).map((s,i)=>(i+1)+'. <strong>'+s.id+'</strong> \u2014 '+s.current[metric]+'%').join('<br>');
                }
            }
            // Improved / declined
            if(ql.match(/improved|improving|up|gaining/)){
                const improved=D.stores.filter(s=>gn(calc(s.current).ov)>gn(calc(s.march).ov));
                if(!improved.length) return 'No stores improved their overall letter grade from March.';
                return improved.length+' stores improved (Mar → Apr):<br>'+improved.map(s=>'\u2022 <strong>'+s.id+'</strong> '+calc(s.march).ov+' \u2192 '+calc(s.current).ov).join('<br>');
            }
            if(ql.match(/declined|dropping|down|falling|slipping/)){
                const declined=D.stores.filter(s=>gn(calc(s.current).ov)<gn(calc(s.march).ov));
                if(!declined.length) return 'No stores declined in overall letter grade from March. Everyone is holding or improving!';
                return declined.length+' stores declined (Mar → Apr):<br>'+declined.map(s=>'\u2022 <strong>'+s.id+'</strong> '+calc(s.march).ov+' \u2192 '+calc(s.current).ov).join('<br>');
            }
            // West vs East / compare regions
            if(ql.match(/west|east|region|compare/)){
                const ws=D.stores.filter(s=>s.region==='West'),es=D.stores.filter(s=>s.region==='East');
                const wa=v=>(ws.map(s=>s.current[v]).reduce((a,b)=>a+b,0)/ws.length).toFixed(1);
                const ea=v=>(es.map(s=>s.current[v]).reduce((a,b)=>a+b,0)/es.length).toFixed(1);
                const wOv=s2g(ws.map(s=>calc(s.current).ovS).reduce((a,b)=>a+b,0)/ws.length);
                const eOv=s2g(es.map(s=>calc(s.current).ovS).reduce((a,b)=>a+b,0)/es.length);
                return '<strong>West</strong> (11 stores): Overall '+wOv+' | RI '+wa('req')+'% | Set '+wa('set')+'% | Live '+wa('live')+'% | Appt '+wa('appt')+'%<br><br>'+
                    '<strong>East</strong> (5 stores): Overall '+eOv+' | RI '+ea('req')+'% | Set '+ea('set')+'% | Live '+ea('live')+'% | Appt '+ea('appt')+'%';
            }
            // Average / overall
            if(ql.match(/average|overall|all stores|group/)){
                const avg=v=>(D.stores.map(s=>s.current[v]).reduce((a,b)=>a+b,0)/D.stores.length).toFixed(1);
                const ovGrade=s2g(D.stores.map(s=>calc(s.current).ovS).reduce((a,b)=>a+b,0)/D.stores.length);
                return 'All 17 stores average:<br>Overall: <strong>'+ovGrade+'</strong><br>RI: '+avg('req')+'% | Set: '+avg('set')+'% | Live: '+avg('live')+'% | Appt: '+avg('appt')+'%';
            }
            // Trend queries
            if(ql.match(/trend|month|ytd|over time|history|improving overall|getting better|trajectory/)){
                const metric = ql.includes('ri') || ql.includes('request') ? 'ri' : 'set';
                const label = metric==='set' ? 'Set%' : 'RI%';
                const ms = TRENDS.months;
                const janAvg = trendAvg(metric,0), aprAvg = trendAvg(metric,ms.length-1);
                const ytdD = aprAvg-janAvg;
                let resp = '<strong>'+label+' YTD Trend</strong><br>Group avg: '+janAvg.toFixed(1)+'% (Jan) → <strong>'+aprAvg.toFixed(1)+'%</strong> (Apr)<br>'+
                    'YTD change: <strong style="color:'+(ytdD>=0?'#16a34a':'#dc2626')+'">'+(ytdD>=0?'+':'')+ytdD.toFixed(1)+'</strong><br><br>';
                // Top movers
                const deltas=[];
                D.stores.forEach(s=>{const v=TRENDS[metric][s.id];if(v&&v[0]!==null&&v[ms.length-1]!==null)deltas.push({id:s.id,d:v[ms.length-1]-v[0]});});
                deltas.sort((a,b)=>b.d-a.d);
                resp+='Top gainers: '+deltas.slice(0,3).map(s=>'<strong>'+s.id+'</strong> (+'+ s.d+')').join(', ')+'<br>';
                resp+='Needs attention: '+deltas.slice(-3).reverse().map(s=>'<strong>'+s.id+'</strong> ('+s.d+')').join(', ');
                resp+='<br><br>See the <strong>Inbound Trends</strong> tab for the full chart and table.';
                return resp;
            }
            // Benchmark
            if(ql.match(/bench|target|goal/)){
                return 'Benchmarks: RI 80% | Set 45% | Live Convos 20% | Appt Set 10%<br><br>Grade weighting: Overall = 60% Inbound + 40% Outbound<br>Inbound = 50% RI + 50% Set<br>Outbound = 60% Live + 40% Appt';
            }
            // Green / red / yellow count
            if(ql.match(/green|red|yellow|how many/)){
                let g=0,y=0,r=0;
                D.stores.forEach(s=>{const col=gColor(calc(s.current).ov);if(col==='green')g++;else if(col==='yellow')y++;else r++;});
                return '<strong>'+g+'</strong> green (A/A-/B+), <strong>'+y+'</strong> yellow (B through C), <strong>'+r+'</strong> red (C- and below)';
            }
            // Derby / scorecard / activities
            if(ql.match(/derby|scorecard|manager session|activity|points|low performer|pulling down/)){
                const SCORECARD_URL='https://anderson-scorecard.vercel.app';
                const DERBY_URL='https://ringderby.vercel.app';
                const recs=[];
                // Declined stores with inbound issues → Manager Ring Ring (5 pts, inbound-primary)
                const declined=D.stores.filter(s=>gn(calc(s.current).ov)<gn(calc(s.march).ov));
                const inboundDeclined=declined.filter(s=>{const c=calc(s.current);return gn(c.rg)<3.0||gn(c.sg)<3.0;});
                if(inboundDeclined.length) recs.push('<strong>Manager Ring Ring Session (5 pts)</strong> for: '+inboundDeclined.map(s=>s.id).join(', ')+' \u2014 inbound declined (RI/Set). Manager Ring Ring is primarily an inbound play.');
                // Stores with F/D metrics → Scorecard (1 pt)
                const weak=D.stores.filter(s=>{const c=calc(s.current);return c.rg==='F'||c.rg==='D'||c.sg==='F'||c.sg==='D'||c.lg==='F'||c.lg==='D'||c.ag==='F'||c.ag==='D';});
                const shopStores=weak.filter(s=>!inboundDeclined.includes(s));
                if(shopStores.length) recs.push('<strong>Scorecard (1 pt)</strong> for: '+shopStores.map(s=>s.id).join(', ')+' \u2014 failing metrics. Scorecard will surface whether it\'s call guide, pitch, or list.');
                // Yellow stores → find low performers
                const yellow=D.stores.filter(s=>gColor(calc(s.current).ov)==='yellow'&&!inboundDeclined.includes(s)&&!shopStores.includes(s));
                if(yellow.length) recs.push('<strong>Find the weak link</strong> at: '+yellow.map(s=>s.id).join(', ')+' \u2014 yellow zone. Pull individual rep grades. One or two people are usually sinking the store average \u2014 scorecard their calls specifically.');
                if(!recs.length) recs.push('All stores performing. If you want to stay sharp: pick the lowest-graded rep at any store and scorecard a few of their calls.');
                return recs.join('<br><br>')+'<br><br><a href="'+SCORECARD_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">Open Scorecard</a> | <a href="'+DERBY_URL+'" target="_blank" style="color:#0369a1;text-decoration:underline;">View Derby Board</a>';
            }
            return 'Try asking about a specific store (e.g. "How is Acura doing?"), rankings ("Who has the best set %?"), comparisons ("West vs East"), status ("Who improved?"), or Derby activities ("Which stores need a scorecard?").';
        }

        // ============================================
        // STAFF DRILL-DOWN MODAL
        // ============================================
        function showStaffModal(storeId) {
            const staff = STAFF[storeId];
            if (!staff || !staff.length) return;
            const store = D.stores.find(s => s.id === storeId);
            const storeName = store ? store.name : storeId;

            // Compute store totals
            let totOB=0, totC=0, totA=0;
            staff.forEach(p => { totOB+=p.ob; totC+=p.c; totA+=p.a; });
            const livePct = totOB>0 ? ((totC/totOB)*100).toFixed(1) : '0.0';
            const apptPct = totC>0 ? ((totA/totC)*100).toFixed(1) : '0.0';

            // Sort by live % tier (green top, yellow mid, red bottom), then by live% descending within tier
            const sorted = staff.map(p => {
                const lv = p.ob>0 ? (p.c/p.ob)*100 : 0;
                const tier = lv>=20?0 : lv>=15?1 : 2; // green=0, yellow=1, red=2
                return {...p, lv, tier};
            }).sort((a,b) => a.tier!==b.tier ? a.tier-b.tier : b.lv-a.lv);

            let rows = '';
            sorted.forEach((p,i) => {
                const pLive = p.ob>0 ? p.lv.toFixed(1) : '—';
                const pAppt = p.c>0 ? ((p.a/p.c)*100).toFixed(1) : '—';
                const livCol = p.tier===0?'color:#15803d;font-weight:700;':p.tier===1?'color:#92400e;font-weight:700;':'color:#dc2626;font-weight:700;';
                rows += `<tr style="${p.tier===0?'background:#f0fdf4;':p.tier===1?'background:#fffbeb;':'background:#fef2f2;'}">
                    <td>${i+1}</td>
                    <td>${p.n}</td>
                    <td class="num">${p.ob}</td>
                    <td class="num">${p.c}</td>
                    <td class="num" style="${livCol}">${pLive}%</td>
                    <td class="num">${p.a}</td>
                    <td class="num">${pAppt}%</td>
                </tr>`;
            });

            // Count by tier
            const greenN=sorted.filter(p=>p.tier===0).length;
            const yellowN=sorted.filter(p=>p.tier===1).length;
            const redN=sorted.filter(p=>p.tier===2).length;

            const modalHTML = `
                <div class="staff-modal-hdr">
                    <h3>${storeName} — Apr MTD Outbound (Salespeople Only)</h3>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <button onclick="printStaffModal()" style="background:#0369a1;color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;">Export PDF</button>
                        <button class="close-btn" onclick="closeStaffModal()">&times;</button>
                    </div>
                </div>
                <div class="staff-modal-body">
                    <div class="staff-summary">
                        <div class="ss-box"><strong>${staff.length}</strong>Salespeople</div>
                        <div class="ss-box"><strong>${totOB.toLocaleString()}</strong>Total Outbound</div>
                        <div class="ss-box"><strong>${totC.toLocaleString()}</strong>Connected</div>
                        <div class="ss-box"><strong>${livePct}%</strong>Live Convos %</div>
                        <div class="ss-box"><strong>${totA}</strong>Appts Set</div>
                        <div class="ss-box"><strong>${apptPct}%</strong>Appt Set %</div>
                    </div>
                    <div style="display:flex;gap:12px;align-items:center;padding:6px 0;font-size:11px;">
                        <span style="font-weight:600;color:#64748b;">Live Convos %:</span>
                        <span style="background:#f0fdf4;color:#15803d;padding:2px 8px;border-radius:4px;font-weight:600;">${greenN} ≥ 20% (Benchmark)</span>
                        <span style="background:#fffbeb;color:#92400e;padding:2px 8px;border-radius:4px;font-weight:600;">${yellowN} 15–20%</span>
                        <span style="background:#fef2f2;color:#dc2626;padding:2px 8px;border-radius:4px;font-weight:600;">${redN} < 15% (Coaching needed)</span>
                    </div>
                    <table class="staff-tbl">
                        <thead><tr><th>#</th><th>Salesperson</th><th class="num">OB Calls</th><th class="num">Conn</th><th class="num">Live %</th><th class="num">Appts</th><th class="num">Appt %</th></tr></thead>
                        <tbody>${rows}</tbody>
                        <tfoot><tr style="font-weight:700;border-top:2px solid #d0d5dd;">
                            <td></td><td>STORE TOTAL</td>
                            <td class="num">${totOB.toLocaleString()}</td>
                            <td class="num">${totC.toLocaleString()}</td>
                            <td class="num">${livePct}%</td>
                            <td class="num">${totA}</td>
                            <td class="num">${apptPct}%</td>
                        </tr></tfoot>
                    </table>
                </div>`;

            const overlay = document.getElementById('staffOverlay');
            overlay.querySelector('.staff-modal').innerHTML = modalHTML;
            overlay.classList.add('active');
        }
        function closeStaffModal() {
            document.getElementById('staffOverlay').classList.remove('active');
        }
        function printStaffModal() {
            document.body.classList.add('printing-modal');
            window.print();
            document.body.classList.remove('printing-modal');
        }
        document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeStaffModal(); closeSpotlight(); }});

        // ============================================
        // STORE SPOTLIGHT
        // ============================================
        function showSpotlight(storeId) {
            const store = D.stores.find(s=>s.id===storeId);
            if(!store) return;
            const c = calc(store.current), m = calc(store.march), y = calc(store.ytd);
            const staff = STAFF[storeId] || [];

            // Grade color helper
            function gBg(grade) {
                const col = gColor(grade);
                return col==='green'?'background:#dcfce7;color:#15803d;':col==='yellow'?'background:#fef9c3;color:#854d0e;':'background:#fecaca;color:#991b1b;';
            }

            // Grade strip — show Apr (current) with Mar comparison
            const metrics = [
                {label:'Overall', grade:c.ov, prev:m.ov},
                {label:'Inbound', grade:c.ib, prev:m.ib},
                {label:'RI%', grade:c.rg, pct:store.current.req+'%', prev:store.march.req+'%'},
                {label:'Set%', grade:c.sg, pct:store.current.set+'%', prev:store.march.set+'%'},
                {label:'Outbound', grade:c.ob, prev:m.ob},
                {label:'Live%', grade:c.lg, pct:store.current.live+'%', prev:store.march.live+'%'},
                {label:'Appt%', grade:c.ag, pct:store.current.appt+'%', prev:store.march.appt+'%'}
            ];

            let gradeStrip = metrics.map(mt => `
                <div class="spotlight-grade-box" style="${gBg(mt.grade)}">
                    <div class="sg-label">${mt.label}</div>
                    <div class="sg-val">${mt.grade}</div>
                    <div class="sg-pct">${mt.pct||''} ${mt.prev?'(Mar: '+mt.prev+')':''}</div>
                </div>`).join('');

            // Inbound trends
            const months = TRENDS.months;
            function trendRow(label, vals, bench) {
                if(!vals) return '';
                let html = `<div class="spotlight-trend-row"><span class="spotlight-trend-label">${label}</span><div class="spotlight-trend-vals">`;
                vals.forEach((v,i) => {
                    const bg = v===null?'background:#f9fafb;color:#d0d5dd;': v>=bench?'background:#dcfce7;color:#15803d;': v>=bench*0.8?'background:#fef9c3;color:#854d0e;':'background:#fecaca;color:#991b1b;';
                    html += `<div class="spotlight-trend-cell" style="${bg}">${v!==null?v+'%':'—'}</div>`;
                });
                html += `</div></div>`;
                return html;
            }

            let trendHTML = `<div class="spotlight-section">
                <h4>Inbound Trends (Jan – Apr YTD)</h4>
                <div style="display:flex;gap:6px;margin-bottom:4px;padding-left:36px;font-size:9px;color:#9ca3af;">

            // Staff table (top 10)

                        }).join('')}</tbody>

                            <td>STORE TOTAL</td><td class="num">${totOB}</td><td class="num">${totC}</td>

            }

            document.getElementById('spotlightModal').innerHTML = `
                <div class="spotlight-hdr">

            document.getElementById('spotlightOverlay').classList.add('active');
        }
        function closeSpotlight() {
            document.getElementById('spotlightOverlay').classList.remove('active');
        }

        // ============================================
        // FOCUS MODE (Inbound-only / Outbound-only w/ region filter)
        // ============================================
        let focusState = { mode:null, region:null };
        function openFocus(mode){
            focusState.mode = mode;
            focusState.region = null;
            const isIB = mode === 'ib';
            document.getElementById('focusTitle').textContent = isIB ? 'Inbound Focus' : 'Outbound Focus';
            document.getElementById('focusSub').textContent = isIB
                ? 'Request In% + Set% — did they ask for the visit, did they lock the appointment'
                : 'Live Convos% + Appt% — did they connect with a human, did they close the appointment';
            const westStores = D.stores.filter(s=>s.region==='West');
            const eastStores = D.stores.filter(s=>s.region==='East');
            const westNames = westStores.map(s=>s.id).join(' · ');
            const eastNames = eastStores.map(s=>s.id).join(' · ');
            document.getElementById('focusBody').innerHTML = `
                <div class="focus-region-prompt">

        function closeFocus(){
            document.getElementById('focusOverlay').classList.remove('active');
            focusState.mode = null;
            focusState.region = null;
        }
        function setFocusRegion(r){
            focusState.region = r;
            renderFocus();
        }
        function renderFocus(){
            const {mode, region} = focusState;
            if(!mode || !region) return;
            const isIB = mode === 'ib';
            const title = isIB ? 'Inbound Focus' : 'Outbound Focus';
            const sub = isIB
                ? 'Request In% + Set% — did they ask for the visit, did they lock the appointment'
                : 'Live Convos% + Appt% — did they connect with a human, did they close the appointment';
            document.getElementById('focusTitle').textContent = title;
            document.getElementById('focusSub').textContent = sub + ' · ' + (region==='All'?'All regions':region + ' region');
            // filter stores
            let pool = D.stores.slice();
            if(region !== 'All') pool = pool.filter(s => s.region === region);
            // compute channel grade for each
            const scored = pool.map(s => {
                const g = calc(s.current);
                const gb = calc(s.baseline);
                const channelLetter = isIB ? g.ib : g.ob;
                const channelScoreNum = isIB ? g.iS : g.oS;
                const baselineScore = isIB ? (gn(gb.rg)+gn(gb.sg))/2 : gn(gb.lg)*0.6+gn(gb.ag)*0.4;
                const delta = channelScoreNum - baselineScore;
                return {
                    s, g, gb, ch:channelLetter, chN:channelScoreNum, base:baselineScore, delta,
                    primary: isIB ? s.current.req : s.current.live,
                    secondary: isIB ? s.current.set : s.current.appt,
                    primaryG: isIB ? g.rg : g.lg,
                    secondaryG: isIB ? g.sg : g.ag,
                    primaryBench: isIB ? BENCH.req : BENCH.live,
                    secondaryBench: isIB ? BENCH.set : BENCH.appt,
                    primaryLabel: isIB ? 'RI%' : 'Live%',
                    secondaryLabel: isIB ? 'Set%' : 'Appt%'
                };
            });
            scored.sort((a,b)=>b.chN - a.chN);
            // group summary
            const avgScore = scored.reduce((a,x)=>a+x.chN,0)/scored.length;
            const avgLetter = s2g(avgScore);
            const avgPrimary = scored.reduce((a,x)=>a+x.primary,0)/scored.length;
            const avgSecondary = scored.reduce((a,x)=>a+x.secondary,0)/scored.length;
            const improved = scored.filter(x=>x.delta >= 0.3).length;
            const declined = scored.filter(x=>x.delta <= -0.3).length;
            const top = scored[0], bottom = scored[scored.length-1];
            // training priorities: stores with lowest channel grade AND biggest gap to benchmark
            const priorities = scored.slice().reverse().slice(0,3).map(x => {
                const pGap = x.primaryBench - x.primary;
                const sGap = x.secondaryBench - x.secondary;
                const biggerGap = pGap > sGap ? {label:x.primaryLabel, val:x.primary, bench:x.primaryBench, gap:pGap, key:isIB?'req':'live'} : {label:x.secondaryLabel, val:x.secondary, bench:x.secondaryBench, gap:sGap, key:isIB?'set':'appt'};
                return {x, biggerGap, pGap, sGap};
            });
            // strengths: top 2
            const strengths = scored.slice(0,2);
            // trend (month-over-month Apr vs Mar)
            const trendData = scored.map(x => {
                const prim = isIB ? TRENDS.ri[x.s.id] : OB_TRENDS.live[x.s.id];
                const sec = isIB ? TRENDS.set[x.s.id] : OB_TRENDS.appt[x.s.id];
                const mar = prim && prim[2]!=null && sec && sec[2]!=null ? (gn(gg(prim[2], isIB?'req':'live')) + gn(gg(sec[2], isIB?'set':'appt'))) / 2 : null;
                return {id:x.s.id, mar, apr:x.chN, diff: mar!=null ? x.chN - mar : null};
            });
            // Build summary grid
            const summaryHTML = `
                <div class="focus-summary-grid">
                    <div class="fsm-box"><div class="fsm-lbl">Group Grade</div><div class="fsm-val" style="color:${gradeColor(avgLetter)};">${avgLetter}</div><div class="fsm-sub">${scored.length} store${scored.length===1?'':'s'} · avg ${avgScore.toFixed(2)} GPA</div></div>
                    <div class="fsm-box"><div class="fsm-lbl">Avg ${isIB?'RI%':'Live%'}</div><div class="fsm-val">${avgPrimary.toFixed(1)}%</div><div class="fsm-sub">Bench: ${isIB?BENCH.req:BENCH.live}%</div></div>
                    <div class="fsm-box"><div class="fsm-lbl">Avg ${isIB?'Set%':'Appt%'}</div><div class="fsm-val">${avgSecondary.toFixed(1)}%</div><div class="fsm-sub">Bench: ${isIB?BENCH.set:BENCH.appt}%</div></div>
                    <div class="fsm-box"><div class="fsm-lbl">Improved vs baseline</div><div class="fsm-val" style="color:#16a34a;">${improved}</div><div class="fsm-sub">Declined: ${declined}</div></div>
                    <div class="fsm-box"><div class="fsm-lbl">Top performer</div><div class="fsm-val" style="font-size:16px;">${top.s.id} · ${top.ch}</div><div class="fsm-sub">${top.s.name.replace('Fred Anderson ','')}</div></div>
                    <div class="fsm-box"><div class="fsm-lbl">Bottom</div><div class="fsm-val" style="font-size:16px;">${bottom.s.id} · ${bottom.ch}</div><div class="fsm-sub">${bottom.s.name.replace('Fred Anderson ','')}</div></div>
                </div>`;
            // Ranking table
            function gradePair(fromG, toG, diff){
                const arrowCol = diff == null ? '#94a3b8' : diff >= 0.2 ? '#16a34a' : diff <= -0.2 ? '#dc2626' : '#94a3b8';
                const arrowChar = diff == null ? '&rarr;' : diff >= 0.2 ? '&#9650;' : diff <= -0.2 ? '&#9660;' : '&rarr;';
                if(fromG == null) return `<span style="color:${arrowCol};">${arrowChar}</span>`;
                return `<span style="color:#94a3b8;">${fromG}</span> <span style="color:${arrowCol};font-size:10px;margin-left:4px;">${arrowChar}</span>`;
            }
            let tableRows = scored.map((x, idx) => {
                const td = trendData[idx];
                const marGrade = td.mar != null ? s2g(td.mar) : null;
                const aprGrade = x.ch;
                const baseGrade = s2g(x.base);
                return `<tr>
                    <td><strong>${x.s.id}</strong> <span style="color:#6b7280;font-size:11px;">${x.s.name.replace('Fred Anderson ','').replace('Fred Anderson','')}</span></td>
                    <td><span class="grade-pill" style="background:${gradeColor(x.ch)}20;color:${gradeColor(x.ch)};">${x.ch}</span></td>
                    <td class="num">${x.primary.toFixed(0)}% <span style="color:#9ca3af;font-size:10px;">(${x.primaryG})</span></td>
                    <td class="num">${x.secondary.toFixed(0)}% <span style="color:#9ca3af;font-size:10px;">(${x.secondaryG})</span></td>
                    <td class="num">${gradePair(marGrade, aprGrade, td.diff)}</td>
                    <td class="num">${gradePair(baseGrade, aprGrade, x.delta)}</td>
                </tr>`;
            }).join('');
            const tableHTML = `
                <table class="focus-tbl">
                    <thead><tr>
                        <th>Store</th>
                        <th>${isIB?'Inbound':'Outbound'} Grade</th>
                        <th style="text-align:right;">${isIB?'RI%':'Live%'}</th>
                        <th style="text-align:right;">${isIB?'Set%':'Appt%'}</th>
                        <th style="text-align:right;">Mar &rarr; Apr</th>
                        <th style="text-align:right;">vs Start</th>
                    </tr></thead>
                    <tbody>${tableRows}</tbody>
                </table>`;
            // Training priorities (tone: Laura, blunt, trainer-focused, correct metric meaning)
            const priorityHTML = priorities.map((p, rank) => {
                const {x, biggerGap} = p;
                // severity based on rank + gap size
                const sev = rank === 0 ? 'high' : rank === 1 ? 'med' : 'low';
                const sevLabel = rank === 0 ? '&#128680; Top priority' : rank === 1 ? '&#9888;&#65039; High priority' : '&#128205; Watch closely';
                const actionLabel = rank === 0 ? 'This Week' : 'Next Session';
                let action = '', diagnosis = '';
                if(isIB){
                    if(biggerGap.key==='req'){
                        diagnosis = `They're taking inbound calls but not asking the customer to come in. The BDR is gathering info and saying goodbye instead of pivoting to the invite.`;
                        action = `Pull 3 answered calls per rep. Mark exactly where they should've said "let's get you in to see it" and didn't. Run it in the next Manager Ring Ring Session — play the call, pause at the miss, have them redo the line.`;
                    } else {
                        diagnosis = `They're asking for the visit but the customer is wiggling out without a firm appointment. Call-guide gap at the set step — likely taking "let me check my schedule" as a no.`;
                        action = `Sit with the weakest 2–3 reps for a Manager Ring Ring Session specifically on the set step. Two-choice close, confirm the name + time, handle the "I'll call back" without losing the appointment.`;
                    }
                } else {
                    if(biggerGap.key==='live'){
                        diagnosis = `They're dialing into voicemails and hangups. Either the list is stale or the timing is wrong — they're not getting to actual humans.`;
                        action = `Audit what list they're working. Organizer follow-ups and unsold showroom traffic should be the top of the queue, not aged orphans. Also check dial times — lunch and 5pm answer rates are garbage.`;
                    } else {
                        diagnosis = `They're getting live conversations but folding before the appointment. The call guide falls apart at the set step — likely giving up on the first soft objection.`;
                        action = `Listen to 5 outbound connects per person. Mark the moment they could've gone for the appointment and didn't. Play the best connect of the week as the benchmark at the next huddle.`;
                    }
                }
                const atBench = biggerGap.val >= biggerGap.bench;
                return `<div class="focus-priority sev-${sev}">
                    <div class="fp-head">
                        <div class="fp-head-left">
                            <div class="fp-badge sev-${sev}">${sevLabel}</div>
                            <div class="fp-store"><span class="fp-id">${x.s.id}</span>${x.s.name.replace('Fred Anderson ','')}</div>
                        </div>
                        <div class="fp-gap-stat">
                            <div class="fp-gap-num">${atBench?'+':'-'}${Math.abs(biggerGap.gap).toFixed(1)}</div>
                            <div class="fp-gap-lbl">pts ${atBench?'above':'below'} bench</div>
                        </div>
                    </div>
                    <div class="fp-stats">
                        <span class="fp-stat-item"><strong>${biggerGap.label}</strong> ${biggerGap.val}% (bench ${biggerGap.bench}%)</span>
                        <span class="fp-stat-item">Channel grade <strong>${x.ch}</strong></span>
                        <span class="fp-stat-item">vs start <strong style="color:${x.delta>=0?'#16a34a':'#dc2626'};">${x.delta>=0?'+':''}${x.delta.toFixed(2)}</strong></span>
                    </div>
                    <div style="font-size:12px;line-height:1.5;margin-bottom:8px;">${diagnosis}</div>
                    <div class="fp-action">
                        <div class="fp-action-label">&#9654; Do this ${actionLabel.toLowerCase()}</div>
                        ${action}
                    </div>
                </div>`;
            }).join('');
            // Strengths
            const strengthHTML = strengths.map(x => {
                const isAbove = x.primary >= x.primaryBench || x.secondary >= x.secondaryBench;
                const aboveNote = x.primary >= x.primaryBench && x.secondary >= x.secondaryBench
                    ? 'Both metrics above bench.'
                    : x.primary >= x.primaryBench
                        ? `${x.primaryLabel} above bench (${x.primary}% vs ${x.primaryBench}%).`
                        : x.secondary >= x.secondaryBench
                            ? `${x.secondaryLabel} above bench (${x.secondary}% vs ${x.secondaryBench}%).`
                            : `Leading the group but not at bench yet.`;
                return `<div class="focus-strength">
                    <div class="fp-title">Strength: ${x.s.id} — ${x.s.name.replace('Fred Anderson ','')}</div>
                    Grade <strong>${x.ch}</strong>. ${aboveNote} Use as the benchmark example when coaching ${isIB?'inbound':'outbound'} at other stores.
                </div>`;
            }).join('');
            // Compose body
            const regionBadgeColor = region === 'East' ? '#dbeafe' : region === 'West' ? '#dcfce7' : '#ede9fe';
            const regionBadgeTextColor = region === 'East' ? '#1e40af' : region === 'West' ? '#166534' : '#6b21a8';
            document.getElementById('focusBody').innerHTML = `
                <button class="focus-back" onclick="openFocus(focusState.mode)">&larr; Change region</button>
                <span class="focus-region-badge" style="background:${regionBadgeColor};color:${regionBadgeTextColor};">${region === 'All' ? 'All regions' : region + ' region'} &middot; ${scored.length} store${scored.length===1?'':'s'}</span>
                <div class="focus-section">
                    <h3>Where ${region==='All'?'the group':region} stands — ${isIB?'Inbound':'Outbound'}</h3>
                    ${summaryHTML}
                </div>
                <div class="focus-section">
                    <h3>${isIB?'Inbound':'Outbound'} trend — Jan through Apr</h3>
                    <div class="focus-trend-wrap">
                        <div class="focus-trend-hdr">
                            <span><strong>${region === 'All' ? 'Enterprise' : region + ' region'} average ${isIB?'inbound':'outbound'} GPA</strong> · month over month</span>
                            <span style="color:#94a3b8;">A=4.0 &middot; B=3.0 &middot; C=2.0 &middot; D=1.0</span>
                        </div>
                        <canvas id="focusTrendCanvas" width="860" height="200"></canvas>
                    </div>
                </div>
                <div class="focus-section">
                    <h3>Store ranking (${isIB?'Inbound':'Outbound'})</h3>
                    ${tableHTML}
                </div>
                <div class="focus-section">
                    <h3>&#128293; Training priorities &mdash; tackle these first</h3>
                    ${priorityHTML || '<div style="color:#6b7280;font-size:12px;">No stores flagged.</div>'}
                </div>
                <div class="focus-section">
                    <h3>Strengths to lean on</h3>
                    ${strengthHTML || '<div style="color:#6b7280;font-size:12px;">No strengths identified in this slice.</div>'}
                </div>`;
            // Draw trend chart
            setTimeout(() => drawFocusTrendChart(pool, isIB), 50);
        }
        function drawFocusTrendChart(pool, isIB){
            const canvas = document.getElementById('focusTrendCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0,0,w,h);
            const months = ['Jan','Feb','Mar','Apr'];
            const primArr = isIB ? TRENDS.ri : OB_TRENDS.live;
            const secArr = isIB ? TRENDS.set : OB_TRENDS.appt;
            const primKey = isIB ? 'req' : 'live';
            const secKey = isIB ? 'set' : 'appt';
            // Compute per-month group avg channel GPA
            const series = months.map((_, i) => {
                let sum=0, count=0;
                pool.forEach(s => {
                    const p = primArr[s.id], sc = secArr[s.id];
                    if(p && p[i]!=null && sc && sc[i]!=null){
                        const gp = gn(gg(p[i], primKey));
                        const gs = gn(gg(sc[i], secKey));
                        const channel = isIB ? (gp+gs)/2 : gp*0.6+gs*0.4;
                        sum += channel; count++;
                    }
                });
                return count > 0 ? sum/count : null;
            });
            const pad = {top:18, right:28, bottom:28, left:40};
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;
            const yMin = 0, yMax = 4;
            // Gridlines at A/B/C/D/F
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#94a3b8';
            ctx.font = '10px -apple-system, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            [['A',4],['B',3],['C',2],['D',1],['F',0]].forEach(([label, val]) => {
                const y = pad.top + ch - ((val-yMin)/(yMax-yMin)) * ch;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(pad.left+cw, y);
                ctx.stroke();
                ctx.fillText(label, pad.left-6, y);
            });
            // X labels
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillStyle = '#64748b';
            months.forEach((m, i) => {
                const x = pad.left + (cw/(months.length-1)) * i;
                ctx.fillText(m, x, pad.top+ch+6);
            });
            // Line
            const channelColor = isIB ? '#0ea5e9' : '#f97316';
            ctx.strokeStyle = channelColor;
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            let started = false;
            series.forEach((v, i) => {
                if(v == null) return;
                const x = pad.left + (cw/(months.length-1)) * i;
                const y = pad.top + ch - ((v-yMin)/(yMax-yMin)) * ch;
                if(!started){ ctx.moveTo(x,y); started = true; }
                else ctx.lineTo(x,y);
            });
            ctx.stroke();
            // Area fill
            ctx.lineTo(pad.left + cw, pad.top+ch);
            ctx.lineTo(pad.left, pad.top+ch);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top+ch);
            grad.addColorStop(0, channelColor + '30');
            grad.addColorStop(1, channelColor + '05');
            ctx.fillStyle = grad;
            ctx.fill();
            // Points + labels
            series.forEach((v, i) => {
                if(v == null) return;
                const x = pad.left + (cw/(months.length-1)) * i;
                const y = pad.top + ch - ((v-yMin)/(yMax-yMin)) * ch;
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = channelColor;
                ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
                // Letter above
                const grade = s2g(v);
                ctx.fillStyle = '#1a1a2e';
                ctx.font = 'bold 11px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(grade, x, y-10);
            });
        }
        function gradeColor(g){
            if(g.startsWith('A')) return '#16a34a';
            if(g.startsWith('B')) return '#0284c7';
            if(g.startsWith('C')) return '#ca8a04';
            if(g.startsWith('D')) return '#ea580c';
            return '#dc2626';
        }
        // Close focus on Esc
        document.addEventListener('keydown', e => {
            if(e.key === 'Escape' && focusState.mode) closeFocus();
        });

        // ============================================
        // INBOUND TRENDS
        // ============================================
        let trendMetric = 'ri';

        function trendAvg(metric, monthIdx) {
            let sum=0, count=0;
            D.stores.forEach(s => {
                const vals = TRENDS[metric][s.id];
                if(vals && vals[monthIdx] !== null) { sum += vals[monthIdx]; count++; }
            });
            return count > 0 ? (sum/count) : null;
        }

        function hmColor(val, bench) {
            if(val === null) return 'background:#f9fafb;color:#d0d5dd;';
            const ratio = val / bench;
            if(ratio >= 1.0) return 'background:#dcfce7;color:#15803d;';
            if(ratio >= 0.9) return 'background:#d1fae5;color:#166534;';
            if(ratio >= 0.8) return 'background:#fef9c3;color:#854d0e;';
            if(ratio >= 0.7) return 'background:#fed7aa;color:#9a3412;';
            return 'background:#fecaca;color:#991b1b;';

        function drawOBTrendChart() {
            const canvas = document.getElementById('obTrendCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.clientWidth, h = canvas.clientHeight;
            canvas.width = w * dpr; canvas.height = h * dpr;
            ctx.scale(dpr, dpr);

            const m = obMetric;
            const months = OB_TRENDS.months;
            const bench = m === 'live' ? 20 : 10;
            const pad = {top:20, right:60, bottom:30, left:44};
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;

            const westStores = D.stores.filter(s=>s.region==='West');
            const eastStores = D.stores.filter(s=>s.region==='East');
            function seriesAvg(stores, mi) {
                let s=0,c=0;
                stores.forEach(st=>{const v=OB_TRENDS[m][st.id];if(v&&v[mi]!==null){s+=v[mi];c++;}});
                return c>0?(s/c):null;
            }
            const westSeries = months.map((_,i)=>seriesAvg(westStores,i));
            const eastSeries = months.map((_,i)=>seriesAvg(eastStores,i));

            const allVals = [...westSeries,...eastSeries,bench].filter(v=>v!==null);
            let minV = Math.floor(Math.min(...allVals)/5)*5 - 2;
            let maxV = Math.ceil(Math.max(...allVals)/5)*5 + 3;

            const xStep = cw / (months.length - 1);
            const toX = i => pad.left + i * xStep;
            const toY = v => pad.top + (maxV - v) * (ch / (maxV - minV));

            // Grid
            ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 0.5;
            for(let v = Math.ceil(minV/5)*5; v <= maxV; v += 5) {
                const y = toY(v);
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w-pad.right, y); ctx.stroke();
                ctx.fillStyle = '#9ca3af'; ctx.font = '10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign = 'right';
                ctx.fillText(v + '%', pad.left - 6, y + 3);
            }

            // Benchmark
            const benchY = toY(bench);
            ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1.5; ctx.setLineDash([6,4]);
            ctx.beginPath(); ctx.moveTo(pad.left, benchY); ctx.lineTo(w-pad.right, benchY); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#6b7280'; ctx.font = 'bold 10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign = 'left';
            ctx.fillText('Bench ' + bench + '%', w-pad.right+6, benchY+4);

            function drawLine(series, color, width) {
                ctx.strokeStyle = color; ctx.lineWidth = width; ctx.setLineDash([]);
                ctx.beginPath();
                let started = false;
                series.forEach((v,i) => {
                    if(v===null) return;
                    const x = toX(i), y = toY(v);
                    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
                });
                ctx.stroke();
                series.forEach((v,i) => {
                    if(v===null) return;
                    const x = toX(i), y = toY(v);
                    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
                    ctx.fillStyle='#fff'; ctx.fill();
                    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
                    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
                    const grade = gg(v, m);
                    ctx.fillStyle=color; ctx.font='bold 10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign='center';
                    ctx.fillText(v.toFixed(1)+'% '+grade, x, y-10);
                });
            }

            drawLine(westSeries, '#eab308', 2.5);
            drawLine(eastSeries, '#2563eb', 2.5);

            ctx.fillStyle = '#6b7280'; ctx.font = '11px Helvetica Neue, Helvetica, Arial'; ctx.textAlign = 'center';
            months.forEach((mo,i) => { ctx.fillText(mo, toX(i), h-pad.bottom+18); });
        }

        function drawTrendChart() {

            // Compute all 3 series
            const westStores = D.stores.filter(s=>s.region==='West');
            const eastStores = D.stores.filter(s=>s.region==='East');
            function seriesAvg(stores, mi) {
                let s=0,c=0;
                stores.forEach(st=>{const v=TRENDS[m][st.id];if(v&&v[mi]!==null){s+=v[mi];c++;}});
                return c>0?(s/c):null;
            }
            const westSeries = months.map((_,i)=>seriesAvg(westStores,i));
            const eastSeries = months.map((_,i)=>seriesAvg(eastStores,i));

            // Y range
            const allVals = [...westSeries,...eastSeries,bench].filter(v=>v!==null);
            let minV = Math.floor(Math.min(...allVals)/5)*5 - 2;
            let maxV = Math.ceil(Math.max(...allVals)/5)*5 + 3;

            const xStep = cw / (months.length - 1);
            const yScale = ch / (maxV - minV);
            const toX = i => pad.left + i * xStep;
            const toY = v => pad.top + (maxV - v) * yScale;

            // Grid
            ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 0.5;
            for(let v = Math.ceil(minV/5)*5; v <= maxV; v += 5) {
                const y = toY(v);
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w-pad.right, y); ctx.stroke();
                ctx.fillStyle = '#9ca3af'; ctx.font = '10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign = 'right';
                ctx.fillText(v + '%', pad.left - 6, y + 3);
            }

            // Benchmark dashed line
            const benchY = toY(bench);
            ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1.5; ctx.setLineDash([6,4]);
            ctx.beginPath(); ctx.moveTo(pad.left, benchY); ctx.lineTo(w-pad.right, benchY); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#6b7280'; ctx.font = 'bold 10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign = 'left';
            ctx.fillText('Bench ' + bench + '%', w-pad.right+6, benchY+4);

            // Draw a line series (grade label appended to %)
            const gKey = m==='ri' ? 'req' : 'set';
            function drawLine(series, color, width, dash) {
                ctx.strokeStyle = color; ctx.lineWidth = width; ctx.setLineDash(dash||[]);
                ctx.beginPath();
                let started = false;
                series.forEach((v,i) => {
                    if(v===null) return;
                    const x = toX(i), y = toY(v);
                    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
                });
                ctx.stroke(); ctx.setLineDash([]);
                // Dots + value labels (value + grade)
                series.forEach((v,i) => {
                    if(v===null) return;
                    const x = toX(i), y = toY(v);
                    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
                    ctx.fillStyle='#fff'; ctx.fill();
                    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
                    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
                    // Value label + grade
                    const grade = gg(v, gKey);
                    ctx.fillStyle=color; ctx.font='bold 10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign='center';
                    ctx.fillText(v.toFixed(1)+'% '+grade, x, y-10);
                });
            }

            drawLine(westSeries, '#eab308', 2.5);
            drawLine(eastSeries, '#2563eb', 2.5);

            // X axis
            ctx.fillStyle = '#6b7280'; ctx.font = '11px Helvetica Neue, Helvetica, Arial'; ctx.textAlign = 'center';
            months.forEach((mo,i) => { ctx.fillText(mo, toX(i), h-pad.bottom+18); });
        }

        function drawCombinedTrendChart() {
            const canvas = document.getElementById('combinedTrendCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.clientWidth, h = canvas.clientHeight;
            canvas.width = w * dpr; canvas.height = h * dpr;
            ctx.scale(dpr, dpr);

            const months = TRENDS.months;
            const pad = {top:20, right:80, bottom:30, left:44};
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;

            // Compute enterprise-avg inbound and outbound GPA per month
            function monthGPA(mi){
                let ibSum=0, ibCount=0, obSum=0, obCount=0;
                D.stores.forEach(s=>{
                    const ri=(TRENDS.ri[s.id]||[])[mi];
                    const se=(TRENDS.set[s.id]||[])[mi];
                    const lv=(OB_TRENDS.live[s.id]||[])[mi];
                    const ap=(OB_TRENDS.appt[s.id]||[])[mi];
                    if(ri!=null && se!=null){
                        const iS=(gn(gg(ri,'req'))+gn(gg(se,'set')))/2;
                        ibSum+=iS; ibCount++;
                    }
                    if(lv!=null && ap!=null){
                        const oS=gn(gg(lv,'live'))*0.6+gn(gg(ap,'appt'))*0.4;
                        obSum+=oS; obCount++;
                    }
                });
                return {ib: ibCount>0?ibSum/ibCount:null, ob: obCount>0?obSum/obCount:null};
            }
            const data = months.map((_,i)=>monthGPA(i));
            const ibSeries = data.map(d=>d.ib);
            const obSeries = data.map(d=>d.ob);

            // Y-axis: 0.0 to 4.0 GPA
            const minV = 0, maxV = 4;
            const xStep = cw / (months.length - 1);
            const yScale = ch / (maxV - minV);
            const toX = i => pad.left + i * xStep;
            const toY = v => pad.top + (maxV - v) * yScale;

            // Grade reference lines (A/B/C/D/F)
            const grades=[{v:4.0,g:'A'},{v:3.0,g:'B'},{v:2.0,g:'C'},{v:1.0,g:'D'},{v:0,g:'F'}];
            ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=0.5;
            grades.forEach(gr=>{
                const y=toY(gr.v);
                ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(w-pad.right,y); ctx.stroke();
                ctx.fillStyle='#9ca3af'; ctx.font='10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign='right';
                ctx.fillText(gr.g, pad.left-6, y+3);
            });

            function drawLine(series, color) {
                ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.setLineDash([]);
                ctx.beginPath();
                let started=false;
                series.forEach((v,i)=>{
                    if(v==null) return;
                    const x=toX(i), y=toY(v);
                    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
                });
                ctx.stroke();
                series.forEach((v,i)=>{
                    if(v==null) return;
                    const x=toX(i), y=toY(v);
                    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
                    ctx.fillStyle='#fff'; ctx.fill();
                    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
                    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
                    const lbl=s2g(v);
                    ctx.fillStyle=color; ctx.font='bold 10px Helvetica Neue, Helvetica, Arial'; ctx.textAlign='center';
                    ctx.fillText(lbl, x, y-10);
                });
            }
            drawLine(ibSeries, '#0ea5e9');
            drawLine(obSeries, '#f97316');

            // X axis
            ctx.fillStyle='#6b7280'; ctx.font='11px Helvetica Neue, Helvetica, Arial'; ctx.textAlign='center';
            months.forEach((mo,i)=>{ctx.fillText(mo, toX(i), h-pad.bottom+18);});

            // Right-side end labels
            const lastI = months.length-1;
            if(ibSeries[lastI]!=null){
                ctx.fillStyle='#0ea5e9'; ctx.font='bold 11px Helvetica Neue, Helvetica, Arial'; ctx.textAlign='left';
                ctx.fillText('Inbound', toX(lastI)+10, toY(ibSeries[lastI])+4);
            }
            if(obSeries[lastI]!=null){
                ctx.fillStyle='#f97316'; ctx.font='bold 11px Helvetica Neue, Helvetica, Arial'; ctx.textAlign='left';
                ctx.fillText('Outbound', toX(lastI)+10, toY(obSeries[lastI])+4);
            }
        }

        function renderDates(){
            const now = new Date();
            const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            // CarWars date = yesterday (data is always previous day)
            const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
            const cwDate = mo[yesterday.getMonth()]+' '+yesterday.getDate();
            // MTD range: 1st of current month through yesterday
            const monthStart = mo[now.getMonth()]+' 1';
            const rangeStr = monthStart+' – '+mo[yesterday.getMonth()]+' '+yesterday.getDate();
            document.getElementById('carwarsDate').textContent = cwDate;
            document.getElementById('dateRange').textContent = mo[now.getMonth()]+' MTD ('+rangeStr+')';
        }
        function renderAll(){renderDates();renderStores();renderAlerts();renderCoaching();renderRegions();renderTrends();renderOBTrends();renderBaseline();renderDataEntry();renderSummary();renderInsights();}
        // Most-improved-of-the-week firework on page load
        function showMostImprovedFirework(){
            // Biggest Mar → Apr grade gain
            let top={store:null, delta:-99};
            D.stores.filter(s=>s.id!=='TCC').forEach(s=>{
                const d=calc(s.current).ovS-calc(s.march).ovS;
                if(d>top.delta) top={store:s, delta:d, c:calc(s.current), m:calc(s.march)};
            });
            if(!top.store || top.delta<=0) return;
            // What drove the jump? inbound vs outbound GPA delta
            const ibD=gn(top.c.ib)-gn(top.m.ib);
            const obD=gn(top.c.ob)-gn(top.m.ob);
            let driver;
            if(ibD>0 && obD>0 && Math.abs(ibD-obD)<0.3) driver='Led by inbound + outbound';
            else if(ibD>obD) driver='Led by inbound ('+top.m.ib+' \u2192 '+top.c.ib+')';
            else if(obD>ibD) driver='Led by outbound ('+top.m.ob+' \u2192 '+top.c.ob+')';
            else driver='Across the board';
            const overlay=document.createElement('div');
            overlay.id='fireworkOverlay';
            overlay.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9999;pointer-events:none;background:radial-gradient(circle at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 70%);opacity:0;transition:opacity 0.4s ease;';
            overlay.innerHTML=`
                <div style="position:relative;text-align:center;transform:scale(0.6);transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);opacity:0;" id="fwCard">
                    <div style="font-size:68px;line-height:1;margin-bottom:8px;">\u{1F386}</div>
                    <div style="background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border:3px solid #f59e0b;border-radius:18px;padding:22px 38px;box-shadow:0 20px 60px rgba(0,0,0,0.25);">
                        <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#92400e;font-weight:700;margin-bottom:6px;">Most Improved This Week</div>
                        <div style="font-size:32px;font-weight:800;color:#78350f;margin-bottom:4px;">${top.store.id}</div>
                        <div style="font-size:14px;color:#78350f;margin-bottom:10px;">${top.store.name}</div>
                        <div style="font-size:18px;font-weight:700;color:#15803d;margin-bottom:6px;">${top.m.ov} \u2192 ${top.c.ov}</div>
                        <div style="font-size:12px;font-weight:600;color:#92400e;font-style:italic;">${driver}</div>
                    </div>
                </div>
                <canvas id="fwCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
            `;
            document.body.appendChild(overlay);
            // Fire burst particles
            const canvas=document.getElementById('fwCanvas');
            canvas.width=window.innerWidth; canvas.height=window.innerHeight;
            const ctx=canvas.getContext('2d');
            const cx=window.innerWidth/2, cy=window.innerHeight/2;
            const colors=['#f59e0b','#ef4444','#3b82f6','#10b981','#a855f7','#ec4899'];
            const particles=[];
            for(let burst=0;burst<3;burst++){
                setTimeout(()=>{
                    const bx=cx+(Math.random()-0.5)*400, by=cy-120+(Math.random()-0.5)*200;
                    for(let i=0;i<40;i++){
                        const ang=(Math.PI*2/40)*i, spd=2+Math.random()*4;
                        particles.push({x:bx,y:by,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,color:colors[burst%colors.length]});
                    }
                },burst*250);
            }
            function animate(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p=>{
                    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=0.015;
                    if(p.life>0){
                        ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
                        ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
                    }
                });
                ctx.globalAlpha=1;
                if(particles.some(p=>p.life>0) || particles.length===0) requestAnimationFrame(animate);
            }
            animate();
            // Fade in
            requestAnimationFrame(()=>{
                overlay.style.opacity='1';
                const card=document.getElementById('fwCard');
                card.style.transform='scale(1)'; card.style.opacity='1';
            });
            // Fade out and remove
            setTimeout(()=>{
                overlay.style.opacity='0';
                setTimeout(()=>overlay.remove(), 500);
            }, 3500);
        }
        document.addEventListener('DOMContentLoaded',()=>{renderAll();setTimeout(showMostImprovedFirework,400);});
    </script>
    <div class="staff-overlay" id="staffOverlay" onclick="if(event.target===this)closeStaffModal()">
        <div class="staff-modal"></div>
    </div>
    <div class="spotlight-overlay" id="spotlightOverlay" onclick="if(event.target===this)closeSpotlight()">
        <div class="spotlight-modal" id="spotlightModal"></div>
    </div>
